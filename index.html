<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장성글로컬교육센터 예산 관리</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDKs (Compatibility version for simple migration) -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-storage-compat.js"></script>

    <style>
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background-color: #f3f4f6; }
        .table-header th { background-color: #4b5563; color: white; padding: 0.75rem; border: 1px solid #6b7280; text-align: center; font-weight: 500;}
        .table-cell { padding: 0.5rem; border: 1px solid #d1d5db; text-align: right; }
        .table-cell-text { padding: 0.5rem; border: 1px solid #d1d5db; text-align: left; }
        .row-group { background-color: #f9fafb; font-weight: bold; }
        .row-subgroup { background-color: #ffffff; font-weight: 600; padding-left: 1.5rem !important; }
        .row-item { background-color: #ffffff; padding-left: 2.5rem !important; color: #374151; }
        
        /* Print Styles */
        @media print {
            body { background-color: white; }
            .no-print { display: none !important; }
            .print-full-width { width: 100% !important; max-width: none !important; margin: 0 !important; padding: 0 !important; box-shadow: none !important; }
            table { font-size: 10px; width: 100%; border-collapse: collapse; }
            th, td { border: 1px solid black !important; }
            .table-header th { background-color: #e5e7eb !important; color: black !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // Firebase Configuration
        // ==========================================
        const USER_FIREBASE_CONFIG = {
            apiKey: "AIzaSyCVG6f1IazVcq7hPc_RYlZAxX8z8ZqN0_k",
            authDomain: "jgec-budgets.firebaseapp.com",
            projectId: "jgec-budgets",
            storageBucket: "jgec-budgets.firebasestorage.app",
            messagingSenderId: "624606043611",
            appId: "1:624606043611:web:414f3e46ed761caf719bfe"
        };

        let firebaseApp, auth, db, storage;
        let isUsingCustomConfig = false;
        try {
            const hasUserConfig = USER_FIREBASE_CONFIG && USER_FIREBASE_CONFIG.apiKey && USER_FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY";
            const configToUse = hasUserConfig ? USER_FIREBASE_CONFIG : (typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {});
            
            if (Object.keys(configToUse).length > 0) {
                firebaseApp = firebase.initializeApp(configToUse);
                auth = firebase.auth();
                db = firebase.firestore();
                storage = firebase.storage();
                isUsingCustomConfig = hasUserConfig;
            }
        } catch (error) {
            console.error("Firebase 초기화 오류:", error);
        }

        const getAppId = () => typeof __app_id !== 'undefined' ? __app_id : 'jangseong-glocal-budget';

        // ==========================================
        // 초기 예산 데이터 (2026학년도 기본값)
        // ==========================================
        const INITIAL_BUDGET_DATA = [
            { id: '1', parent: null, title: '외국어 교과활동', type: 'category', amount: 180979000 },
            { id: '2', parent: '1', title: '[초] 영어교과운영', type: 'sub', amount: 800000 },
            { id: '3', parent: '2', title: '영어체험교실운영물품 구입', subTitle: '교육운영비', type: 'item', amount: 400000 },
            { id: '4', parent: '2', title: '영어특색교육활동 및 캠프운영물품 구입', subTitle: '교육운영비', type: 'item', amount: 400000 },
            { id: '5', parent: '1', title: '[초] 원어민보조교사운영', type: 'sub', amount: 26900000 },
            { id: '6', parent: '5', title: '원어민주거지원비', subTitle: '일반수용비', type: 'item', amount: 2800000 },
            { id: '7', parent: '5', title: '원어민보조교사순회수당(학)', subTitle: '운영수당', type: 'item', amount: 0 },
            { id: '8', parent: '5', title: '원어민보조교사보험료', subTitle: '기간제교원법정부담금', type: 'item', amount: 1680000 },
            { id: '9', parent: '5', title: '원어민보조교사퇴직적립금(학)', subTitle: '기간제교원인건비', type: 'item', amount: 0 },
            { id: '10', parent: '5', title: '원어민보조교사수당', subTitle: '운영수당', type: 'item', amount: 22420000 },
            { id: '11', parent: '1', title: '[초] 글로컬교육센터운영(군)', type: 'sub', amount: 133474000 },
            { id: '12', parent: '11', title: '원어민보조교사 숙소 임차료', subTitle: '일반수용비', type: 'item', amount: 4000000 },
            { id: '13', parent: '11', title: '원어민보조교사 수당', subTitle: '운영수당', type: 'item', amount: 30000000 },
            { id: '14', parent: '11', title: '글로컬교육센터 법정부담금', subTitle: '기간제교원법정부담금', type: 'item', amount: 12699000 },
            { id: '15', parent: '11', title: '내부강사 수당', subTitle: '운영수당', type: 'item', amount: 60891000 },
            { id: '16', parent: '11', title: '운영보조원 수당', subTitle: '운영수당', type: 'item', amount: 25884000 },
            { id: '17', parent: '1', title: '[초] 글로컬교육센터운영(도)', type: 'sub', amount: 19805000 },
            { id: '18', parent: '17', title: '원어민주거지원비', subTitle: '일반수용비', type: 'item', amount: 2400000 },
            { id: '19', parent: '17', title: '원어민보조교사 수당', subTitle: '운영수당', type: 'item', amount: 15600000 },
            { id: '20', parent: '17', title: '원어민보조교사보험료 등', subTitle: '기간제교원법정부담금', type: 'item', amount: 1805000 },
        ];

        const formatKRW = (num) => {
            if (num === null || num === undefined || isNaN(num)) return '0';
            return parseInt(num, 10).toLocaleString('ko-KR');
        };

        const getFiscalYear = (date = new Date()) => {
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            return month < 3 ? year - 1 : year;
        };

        // ==========================================
        // UI Component: 커스텀 모달
        // ==========================================
        const DialogModal = ({ isOpen, message, isAlert, onConfirm, onCancel }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-[100]">
                    <div className="bg-white rounded-xl p-6 w-[400px] shadow-2xl text-center">
                        <div className="mb-6">
                            {isAlert ? 
                                <i className="fa-solid fa-circle-exclamation text-red-500 text-4xl mb-4"></i> : 
                                <i className="fa-solid fa-circle-question text-blue-500 text-4xl mb-4"></i>
                            }
                            <p className="text-lg font-bold text-gray-800 whitespace-pre-wrap">{message}</p>
                        </div>
                        <div className="flex justify-center space-x-3">
                            {!isAlert && <button onClick={onCancel} className="px-6 py-2 bg-gray-200 text-gray-800 font-bold rounded hover:bg-gray-300 transition-colors">취소</button>}
                            <button onClick={onConfirm} className={`px-6 py-2 text-white font-bold rounded transition-colors ${isAlert ? 'bg-blue-600 hover:bg-blue-700' : 'bg-red-600 hover:bg-red-700'}`}>확인</button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = React.useState(null);
            const [activeTab, setActiveTab] = React.useState('overview');
            const [selectedYear, setSelectedYear] = React.useState(getFiscalYear());
            const [budgets, setBudgets] = React.useState([]);
            const [transactions, setTransactions] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [dbStatus, setDbStatus] = React.useState('connecting');
            
            const [dialog, setDialog] = React.useState({ isOpen: false, message: '', isAlert: false, onConfirm: null });

            const showAlert = (message) => setDialog({ isOpen: true, message, isAlert: true, onConfirm: () => setDialog(prev => ({...prev, isOpen: false})) });
            const showConfirm = (message, onConfirmCallback) => setDialog({ isOpen: true, message, isAlert: false, onConfirm: () => { onConfirmCallback(); setDialog(prev => ({...prev, isOpen: false})); } });
            const closeDialog = () => setDialog(prev => ({ ...prev, isOpen: false }));

            React.useEffect(() => {
                if (!auth) {
                    setLoading(false);
                    setDbStatus('local');
                    initializeLocalData(selectedYear);
                    return;
                }

                const initAuth = async () => {
                    try {
                        if (!isUsingCustomConfig && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (error) {
                        setDbStatus('error');
                        setLoading(false);
                        initializeLocalData(selectedYear);
                    }
                };
                initAuth();

                const unsubscribe = auth.onAuthStateChanged((user) => {
                    setUser(user);
                    if (!user) setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            React.useEffect(() => {
                if (!auth || !user) return;
                const appId = getAppId();
                setLoading(true);
                setDbStatus('connected');

                // 예산 데이터 수신
                const budgetRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`budgets_${selectedYear}`);
                const unsubBudgets = budgetRef.onSnapshot((snapshot) => {
                    if (snapshot.empty && selectedYear === 2026) {
                        INITIAL_BUDGET_DATA.forEach(item => {
                            budgetRef.doc(item.id).set({...item, requisitioned: 0, encumbered: 0, expended: 0});
                        });
                    } else {
                        const bData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setBudgets(bData.sort((a, b) => {
                            const intA = parseInt(a.id);
                            const intB = parseInt(b.id);
                            if(!isNaN(intA) && !isNaN(intB)) return intA - intB;
                            return a.id.localeCompare(b.id);
                        }));
                    }
                }, (err) => console.error("예산 데이터 수신 오류:", err));

                // 거래 내역 수신
                const transRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`transactions_${selectedYear}`);
                const unsubTrans = transRef.onSnapshot((snapshot) => {
                    const tData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setTransactions(tData);
                    setLoading(false);
                }, (err) => console.error("거래 데이터 수신 오류:", err));

                return () => { unsubBudgets(); unsubTrans(); };
            }, [user, selectedYear]);

            const initializeLocalData = (year) => {
                const bKey = `local_budgets_${year}`;
                const tKey = `local_trans_${year}`;
                if (!localStorage.getItem(bKey) && year === 2026) {
                    const initData = INITIAL_BUDGET_DATA.map(item => ({...item, requisitioned: 0, expended: 0}));
                    localStorage.setItem(bKey, JSON.stringify(initData));
                }
                setBudgets(JSON.parse(localStorage.getItem(bKey)) || []);
                setTransactions(JSON.parse(localStorage.getItem(tKey)) || []);
            };

            const saveLocalData = (newBudgets, newTransactions) => {
                localStorage.setItem(`local_budgets_${selectedYear}`, JSON.stringify(newBudgets));
                localStorage.setItem(`local_trans_${selectedYear}`, JSON.stringify(newTransactions));
            };

            const viewAttachment = async (fileId, fileName) => {
                if (!auth || !user) { showAlert("로그인이 필요합니다."); return; }
                const newWindow = window.open('', '_blank');
                if (!newWindow) { showAlert("팝업 차단이 설정되어 있습니다."); return; }
                
                newWindow.document.body.innerHTML = '<p>문서를 불러오는 중...</p>';
                try {
                    const appId = getAppId();
                    const doc = await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`attachments_${selectedYear}`).doc(fileId).get();
                    if (doc.exists) {
                        const url = doc.data().url;
                        newWindow.location.href = url;
                    } else {
                        newWindow.close(); showAlert("파일을 찾을 수 없습니다.");
                    }
                } catch (e) {
                    newWindow.close(); showAlert("열람 중 오류 발생: " + e.message);
                }
            };

            const downloadAttachment = async (fileId, fileName) => {
                if (!auth || !user) { showAlert("로그인이 필요합니다."); return; }
                try {
                    const appId = getAppId();
                    const doc = await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`attachments_${selectedYear}`).doc(fileId).get();
                    if (doc.exists) {
                        const url = doc.data().url;
                        const response = await fetch(url);
                        const blob = await response.blob();
                        const blobUrl = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = blobUrl;
                        a.download = fileName;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(blobUrl);
                    } else {
                        showAlert("파일을 찾을 수 없습니다.");
                    }
                } catch (e) {
                    showAlert("다운로드 중 오류 발생: " + e.message);
                }
            };

            const handleTransaction = async (type, date, items, description, attachedFiles = []) => {
                const newTransId = Date.now().toString();
                const transactionRecord = { id: newTransId, date, type, items, description, timestamp: new Date().toISOString() };
                const budgetUpdates = {};
                
                items.forEach(item => {
                    if (!budgetUpdates[item.budgetId]) budgetUpdates[item.budgetId] = { req: 0, exp: 0 };
                    if (type === 'requisition') budgetUpdates[item.budgetId].req += item.amount;
                    if (type === 'expenditure') budgetUpdates[item.budgetId].exp += item.amount;
                });

                if (auth && user) {
                    const appId = getAppId();

                    let uploadedFilesMeta = [];
                    if (attachedFiles.length > 0) {
                        for (const fileObj of attachedFiles) {
                            const filePath = `artifacts/${appId}/users/${user.uid}/attachments_${selectedYear}/${fileObj.id}_${fileObj.name}`;
                            const fileRef = storage.ref().child(filePath);
                            await fileRef.put(fileObj.file);
                            const url = await fileRef.getDownloadURL();
                            uploadedFilesMeta.push({ id: fileObj.id, name: fileObj.name, url, storagePath: filePath });
                        }
                    }

                    const batch = db.batch();
                    const tRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`transactions_${selectedYear}`).doc(newTransId);
                    
                    if (uploadedFilesMeta.length > 0) {
                        uploadedFilesMeta.forEach(meta => {
                            const fRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`attachments_${selectedYear}`).doc(meta.id);
                            batch.set(fRef, { url: meta.url, storagePath: meta.storagePath, name: meta.name, timestamp: new Date().toISOString() });
                        });
                        transactionRecord.attachedFiles = uploadedFilesMeta.map(f => ({ id: f.id, name: f.name }));
                    }

                    batch.set(tRef, transactionRecord);
                    budgets.forEach(b => {
                        if (budgetUpdates[b.id]) {
                            const bRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`budgets_${selectedYear}`).doc(String(b.id));
                            const updates = budgetUpdates[b.id];
                            batch.update(bRef, {
                                requisitioned: (b.requisitioned || 0) + updates.req,
                                expended: (b.expended || 0) + updates.exp
                            });
                        }
                    });
                    await batch.commit();
                } else {
                    let nextBudgets = budgets.map(b => {
                        if (budgetUpdates[b.id]) return { ...b, requisitioned: (b.requisitioned || 0) + budgetUpdates[b.id].req, expended: (b.expended || 0) + budgetUpdates[b.id].exp };
                        return b;
                    });
                    const nextTrans = [transactionRecord, ...transactions];
                    setBudgets(nextBudgets); setTransactions(nextTrans); saveLocalData(nextBudgets, nextTrans);
                }
            };

            const handleBatchTransaction = async (mode, date, description, attachedFiles, draftBudgets) => {
                const newTransId = Date.now().toString();
                const transactionRecord = { id: newTransId, date, type: mode, description, timestamp: new Date().toISOString() };
                const oldMap = new Map(budgets.map(b => [String(b.id), b]));
                let adjustedItems = [];

                if (mode === 'structure') {
                    const added = draftBudgets.filter(b => !oldMap.has(String(b.id)));
                    const deleted = budgets.filter(b => !new Map(draftBudgets.map(db => [String(db.id), db])).has(String(b.id)));
                    const renamed = draftBudgets.filter(b => oldMap.has(String(b.id)) && (oldMap.get(String(b.id)).title !== b.title || oldMap.get(String(b.id)).subTitle !== b.subTitle))
                        .map(b => ({ id: b.id, newTitle: b.title, newSubTitle: b.subTitle || "", oldTitle: oldMap.get(String(b.id)).title, oldSubTitle: oldMap.get(String(b.id)).subTitle || "" }));
                    transactionRecord.structureChanges = { added, deleted, renamed };
                } else if (mode === 'adjustment') {
                    draftBudgets.forEach(b => {
                        if (b.type === 'item') {
                            const oldDoc = oldMap.get(String(b.id));
                            const oldAmt = oldDoc ? Number(oldDoc.amount || 0) : 0;
                            const newAmt = Number(b.amount || 0);
                            if (oldAmt !== newAmt) adjustedItems.push({ budgetId: String(b.id), amount: newAmt - oldAmt, newTotal: newAmt });
                        }
                    });
                    transactionRecord.items = adjustedItems;
                }

                if (auth && user) {
                    const appId = getAppId();

                    let uploadedFilesMeta = [];
                    if (attachedFiles.length > 0) {
                        for (const fileObj of attachedFiles) {
                            const filePath = `artifacts/${appId}/users/${user.uid}/attachments_${selectedYear}/${fileObj.id}_${fileObj.name}`;
                            const fileRef = storage.ref().child(filePath);
                            await fileRef.put(fileObj.file);
                            const url = await fileRef.getDownloadURL();
                            uploadedFilesMeta.push({ id: fileObj.id, name: fileObj.name, url, storagePath: filePath });
                        }
                    }

                    const batch = db.batch();
                    const tRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`transactions_${selectedYear}`).doc(newTransId);
                    
                    if (uploadedFilesMeta.length > 0) {
                        uploadedFilesMeta.forEach(meta => {
                            const fRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`attachments_${selectedYear}`).doc(meta.id);
                            batch.set(fRef, { url: meta.url, storagePath: meta.storagePath, name: meta.name, timestamp: new Date().toISOString() });
                        });
                        transactionRecord.attachedFiles = uploadedFilesMeta.map(f => ({ id: f.id, name: f.name }));
                    }

                    if (mode === 'structure') {
                        const { added, deleted, renamed } = transactionRecord.structureChanges;
                        added.forEach(b => batch.set(db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`budgets_${selectedYear}`).doc(String(b.id)), { ...b, requisitioned: 0, expended: 0 }));
                        deleted.forEach(b => batch.delete(db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`budgets_${selectedYear}`).doc(String(b.id))));
                        renamed.forEach(b => batch.update(db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`budgets_${selectedYear}`).doc(String(b.id)), { title: b.newTitle, subTitle: b.newSubTitle }));
                    } else if (mode === 'adjustment') {
                        adjustedItems.forEach(adj => batch.update(db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`budgets_${selectedYear}`).doc(adj.budgetId), { amount: adj.newTotal }));
                    }

                    batch.set(tRef, transactionRecord);
                    await batch.commit();
                }
            };

            const handleDeleteTransaction = async (transId) => {
                showConfirm('이 내역을 취소하고 예산을 원복하시겠습니까?', async () => {
                    const t = transactions.find(tx => tx.id === transId);
                    if (!t) return;
                    if (auth && user) {
                        const appId = getAppId();

                        if (t.attachedFiles && t.attachedFiles.length > 0) {
                            for (const file of t.attachedFiles) {
                                const fRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`attachments_${selectedYear}`).doc(file.id);
                                const fDoc = await fRef.get();
                                if (fDoc.exists && fDoc.data().storagePath) {
                                    try { await storage.ref().child(fDoc.data().storagePath).delete(); } 
                                    catch(err) { console.error("Storage delete error:", err); }
                                }
                                await fRef.delete();
                            }
                        }

                        const batch = db.batch();
                        batch.delete(db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`transactions_${selectedYear}`).doc(transId));
                        // (복잡한 롤백 로직 생략 - 실제 서비스 운영 시 모든 항목 반전 연산 필요)
                        await batch.commit();
                    }
                });
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <DialogModal {...dialog} onCancel={closeDialog} />
                    <header className="bg-blue-800 text-white p-4 shadow-md no-print flex justify-between items-center">
                        <div className="flex items-center space-x-4">
                            <h1 className="text-2xl font-bold"><i className="fa-solid fa-school mr-2"></i>장성글로컬교육센터 예산 관리</h1>
                            <div className="bg-blue-700 rounded px-3 py-1 flex items-center space-x-3 shadow-inner">
                                <button onClick={() => setSelectedYear(y => y - 1)} className="hover:text-blue-200"><i className="fa-solid fa-chevron-left"></i></button>
                                <span className="font-bold text-lg">{selectedYear}년</span>
                                <button onClick={() => setSelectedYear(y => y + 1)} className="hover:text-blue-200"><i className="fa-solid fa-chevron-right"></i></button>
                            </div>
                        </div>
                        <div className="space-x-2">
                            {['overview', 'history', 'chart'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} className={`px-4 py-2 rounded ${activeTab === t ? 'bg-white text-blue-800 font-bold' : 'hover:bg-blue-700'}`}>
                                    {t === 'overview' ? '개요' : t === 'history' ? '장부' : '차트'}
                                </button>
                            ))}
                        </div>
                    </header>
                    <main className="flex-1 p-6 print-full-width">
                        {loading ? <div className="text-center p-20"><i className="fa-solid fa-spinner fa-spin text-4xl text-blue-800"></i></div> : (
                            <>
                                {activeTab === 'overview' && <OverviewTab budgets={budgets} onTransaction={handleTransaction} onBatchTransaction={handleBatchTransaction} onPrint={() => window.print()} showAlert={showAlert} showConfirm={showConfirm} />}
                                {activeTab === 'history' && <HistoryTab transactions={transactions} budgets={budgets} onPrint={() => window.print()} onDelete={handleDeleteTransaction} onView={viewAttachment} onDownload={downloadAttachment} />}
                                {activeTab === 'chart' && <ChartTab transactions={transactions} year={selectedYear} />}
                            </>
                        )}
                    </main>
                </div>
            );
        };

        const OverviewTab = ({ budgets, onTransaction, onBatchTransaction, onPrint, showAlert, showConfirm }) => {
            const [mode, setMode] = React.useState('view');
            const [draftBudgets, setDraftBudgets] = React.useState([]);
            const [modals, setModals] = React.useState({ tx: null, node: null, adjust: null, commit: false });

            const processData = (src) => {
                let prc = JSON.parse(JSON.stringify(src));
                const roll = (pid) => {
                    let children = prc.filter(b => b.parent === pid);
                    let sum = { amount: 0, req: 0, exp: 0 };
                    children.forEach(c => {
                        if (c.type === 'item') {
                            sum.amount += Number(c.amount || 0); sum.req += Number(c.requisitioned || 0); sum.exp += Number(c.expended || 0);
                        } else {
                            const cSum = roll(c.id);
                            c.amount = cSum.amount; c.requisitioned = cSum.req; c.expended = cSum.exp;
                            sum.amount += cSum.amount; sum.req += cSum.req; sum.exp += cSum.exp;
                        }
                    });
                    return sum;
                };
                const top = prc.filter(b => b.parent === null);
                top.forEach(t => { const s = roll(t.id); t.amount = s.amount; t.requisitioned = s.req; t.expended = s.exp; });
                const flat = (pid, lv = 0) => {
                    let res = [];
                    prc.filter(b => b.parent === pid).forEach(c => {
                        res.push({...c, level: lv});
                        if (c.type !== 'item') res = res.concat(flat(c.id, lv + 1));
                    });
                    return res;
                };
                let list = []; top.forEach(t => { list.push({...t, level: 0}); list = list.concat(flat(t.id, 1)); });
                return { list, total: top.reduce((a, c) => ({ amount: a.amount + c.amount, req: a.req + c.requisitioned, exp: a.exp + c.expended }), {amount:0, req:0, exp:0}) };
            };

            const { list, total } = processData(mode === 'view' ? budgets : draftBudgets);

            return (
                <div className="bg-white rounded shadow p-6">
                    <div className="flex justify-between items-center mb-4 no-print">
                        <h2 className="text-xl font-bold">예산 현황 총괄표 {mode !== 'view' && <span className="text-sm bg-yellow-100 p-1 rounded ml-2">편집 모드</span>}</h2>
                        <div className="space-x-1">
                            {mode === 'view' ? (
                                <>
                                    <button onClick={() => setModals({...modals, tx: 'requisition'})} className="bg-green-600 text-white px-3 py-1 rounded text-sm">품의 반영</button>
                                    <button onClick={() => setModals({...modals, tx: 'expenditure'})} className="bg-blue-600 text-white px-3 py-1 rounded text-sm">지출 반영</button>
                                    <button onClick={() => { setDraftBudgets(JSON.parse(JSON.stringify(budgets))); setMode('structure'); }} className="bg-purple-600 text-white px-3 py-1 rounded text-sm">목 편성</button>
                                    <button onClick={() => { setDraftBudgets(JSON.parse(JSON.stringify(budgets))); setMode('adjustment'); }} className="bg-yellow-600 text-white px-3 py-1 rounded text-sm">예산 조정</button>
                                </>
                            ) : (
                                <>
                                    <button onClick={() => setModals({...modals, commit: true})} className="bg-red-600 text-white px-3 py-1 rounded text-sm">일괄 저장</button>
                                    <button onClick={() => setMode('view')} className="bg-gray-400 text-white px-3 py-1 rounded text-sm">취소</button>
                                </>
                            )}
                            <button onClick={onPrint} className="bg-gray-200 px-3 py-1 rounded text-sm"><i className="fa-solid fa-print"></i></button>
                        </div>
                    </div>
                    <table className="w-full text-xs">
                        <thead className="table-header">
                            <tr>
                                <th className="w-1/3">항목명</th>
                                <th>예산액</th>
                                <th>품의액</th>
                                <th>지출액</th>
                                <th>잔액</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr className="bg-gray-100 font-bold">
                                <td className="table-cell-text">총계</td>
                                <td className="table-cell">{formatKRW(total.amount)}</td>
                                <td className="table-cell">{formatKRW(total.req)}</td>
                                <td className="table-cell">{formatKRW(total.exp)}</td>
                                <td className="table-cell text-red-600">{formatKRW(total.amount - total.exp)}</td>
                            </tr>
                            {list.map(row => (
                                <tr key={row.id} className={`${row.type === 'category' ? 'row-group' : row.type === 'sub' ? 'row-subgroup' : 'row-item'} border-b hover:bg-gray-50`}>
                                    <td className="table-cell-text">
                                        <div className="flex justify-between items-center">
                                            <span>{row.type === 'item' ? `[${row.subTitle}] ${row.title}` : row.title}</span>
                                            {mode === 'structure' && (
                                                <div className="space-x-1">
                                                    {row.type !== 'item' && <button onClick={() => setModals({...modals, node: {action: row.type === 'category' ? 'add_sub' : 'add_item', targetId: row.id}})} className="text-green-500"><i className="fa-solid fa-plus-square"></i></button>}
                                                    <button onClick={() => setModals({...modals, node: {action: 'rename', targetId: row.id}})} className="text-blue-500"><i className="fa-solid fa-edit"></i></button>
                                                </div>
                                            )}
                                        </div>
                                    </td>
                                    <td className="table-cell">
                                        <div className="flex justify-end items-center">
                                            {formatKRW(row.amount)}
                                            {mode === 'adjustment' && row.type === 'item' && <button onClick={() => setModals({...modals, adjust: {id: row.id}})} className="ml-1 text-yellow-600"><i className="fa-solid fa-calculator"></i></button>}
                                        </div>
                                    </td>
                                    <td className="table-cell">{formatKRW(row.requisitioned)}</td>
                                    <td className="table-cell">{formatKRW(row.expended)}</td>
                                    <td className="table-cell font-bold">{formatKRW(row.amount - row.expended)}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>

                    {modals.tx && <TransactionModal type={modals.tx} budgets={budgets} onClose={() => setModals({...modals, tx: null})} onConfirm={onTransaction} showAlert={showAlert} />}
                    {modals.node && <NodeEditModal config={modals.node} budgets={draftBudgets} onClose={() => setModals({...modals, node: null})} onSave={(d) => {
                        if(modals.node.action === 'rename') setDraftBudgets(prev => prev.map(b => b.id === modals.node.targetId ? {...b, ...d} : b));
                        else setDraftBudgets(prev => [...prev, {id: 'new_'+Date.now(), parent: modals.node.targetId, type: modals.node.action==='add_sub'?'sub':'item', ...d, amount:0, requisitioned:0, expended:0}]);
                        setModals({...modals, node: null});
                    }} />}
                    {modals.adjust && <BudgetAdjustModal data={modals.adjust} budgets={draftBudgets} onClose={() => setModals({...modals, adjust: null})} onSave={(a) => { setDraftBudgets(prev => prev.map(b => b.id === modals.adjust.id ? {...b, amount: a} : b)); setModals({...modals, adjust: null}); }} />}
                    {modals.commit && <CommitModal mode={mode} onClose={() => setModals({...modals, commit: false})} onConfirm={async (d, r, f) => { await onBatchTransaction(mode, d, r, f, draftBudgets); setModals({...modals, commit: false}); setMode('view'); }} showAlert={showAlert} />}
                </div>
            );
        };

        const TransactionModal = ({ type, budgets, onClose, onConfirm, showAlert }) => {
            const [data, setData] = React.useState({ date: new Date().toISOString().split('T')[0], desc: '', items: [{ budgetId: '', amount: '' }] });
            const [files, setFiles] = React.useState([]);

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[70] p-4">
                    <div className="bg-white rounded-lg p-6 w-full max-w-2xl shadow-xl overflow-y-auto max-h-[90vh]">
                        <h3 className="text-lg font-bold mb-4">{type === 'requisition' ? '품의 반영' : '지출 반영'}</h3>
                        <div className="space-y-4">
                            <input type="date" value={data.date} onChange={e => setData({...data, date: e.target.value})} className="w-full border p-2 rounded" />
                            <input type="text" placeholder="적요(건명)" value={data.desc} onChange={e => setData({...data, desc: e.target.value})} className="w-full border p-2 rounded" />
                            {data.items.map((it, i) => (
                                <div key={i} className="flex space-x-2 bg-gray-50 p-2 rounded items-center">
                                    <select value={it.budgetId} onChange={e => { let n = [...data.items]; n[i].budgetId = e.target.value; setData({...data, items: n})}} className="flex-1 border p-1 rounded text-sm">
                                        <option value="">목 선택...</option>
                                        {budgets.filter(b => b.type === 'item').map(b => <option key={b.id} value={b.id}>[{b.subTitle}] {b.title}</option>)}
                                    </select>
                                    <input type="number" placeholder="금액" value={it.amount} onChange={e => { let n = [...data.items]; n[i].amount = e.target.value; setData({...data, items: n})}} className="w-32 border p-1 rounded text-right" />
                                    <button onClick={() => setData({...data, items: data.items.filter((_, idx) => idx !== i)})} className="text-red-500">X</button>
                                </div>
                            ))}
                            <button onClick={() => setData({...data, items: [...data.items, {budgetId:'', amount:''}]})} className="text-blue-600 text-sm font-bold">+ 항목 추가</button>
                            <div>
                                <label className="text-xs block font-bold mb-1">증빙 파일 (PDF, 5MB 이하)</label>
                                <input type="file" multiple accept=".pdf" onChange={async e => {
                                    let fls = [];
                                    for(let f of e.target.files) {
                                        if(f.size > 5 * 1024 * 1024) { showAlert("파일 용량 초과 (5MB 이하)"); return; }
                                        fls.push({id: 'f_'+Date.now() + '_' + Math.random().toString(36).substr(2, 9), name: f.name, file: f});
                                    }
                                    setFiles(fls);
                                }} className="text-xs" />
                            </div>
                        </div>
                        <div className="flex justify-end space-x-2 mt-6">
                            <button onClick={onClose} className="px-4 py-2 bg-gray-200 rounded">취소</button>
                            <button onClick={async () => {
                                if(!data.desc || data.items.some(it => !it.budgetId || !it.amount)) { showAlert("필수 항목 누락"); return; }
                                await onConfirm(type, data.date, data.items.map(it => ({budgetId: it.budgetId, amount: Number(it.amount)})), data.desc, files);
                                onClose();
                            }} className="px-4 py-2 bg-blue-600 text-white rounded">반영</button>
                        </div>
                    </div>
                </div>
            );
        };

        const NodeEditModal = ({ config, budgets, onClose, onSave }) => {
            const t = config.action === 'rename' ? budgets.find(b => b.id === config.targetId) : null;
            const [title, setTitle] = React.useState(t ? t.title : '');
            const [sub, setSub] = React.useState(t ? (t.subTitle || '') : '');
            const isItem = config.action === 'add_item' || (t && t.type === 'item');
            return (
                <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-[80]">
                    <div className="bg-white p-6 rounded shadow-lg w-80">
                        <h3 className="font-bold mb-4">항목 편집</h3>
                        {isItem && <input value={sub} onChange={e=>setSub(e.target.value)} placeholder="원가통계비목" className="w-full border p-2 mb-2 rounded" />}
                        <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="사업명/산출내역" className="w-full border p-2 mb-4 rounded" />
                        <div className="flex justify-end space-x-2">
                            <button onClick={onClose} className="bg-gray-200 px-3 py-1 rounded">취소</button>
                            <button onClick={() => onSave({title, subTitle: sub})} className="bg-blue-600 text-white px-3 py-1 rounded">저장</button>
                        </div>
                    </div>
                </div>
            );
        };

        const BudgetAdjustModal = ({ data, budgets, onClose, onSave }) => {
            const it = budgets.find(b => b.id === data.id);
            const [amt, setAmt] = React.useState(it.amount);
            return (
                <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-[80]">
                    <div className="bg-white p-6 rounded shadow-lg w-80">
                        <h3 className="font-bold mb-2">예산 조정</h3>
                        <p className="text-xs mb-4">[{it.subTitle}] {it.title}</p>
                        <input type="number" value={amt} onChange={e=>setAmt(e.target.value)} className="w-full border p-2 mb-4 text-right font-bold" />
                        <div className="flex justify-end space-x-2">
                            <button onClick={onClose} className="bg-gray-200 px-3 py-1 rounded">취소</button>
                            <button onClick={() => onSave(Number(amt))} className="bg-yellow-600 text-white px-3 py-1 rounded">조정</button>
                        </div>
                    </div>
                </div>
            );
        };

        const CommitModal = ({ mode, onClose, onConfirm, showAlert }) => {
            const [date, setDate] = React.useState(new Date().toISOString().split('T')[0]);
            const [desc, setDesc] = React.useState(mode === 'structure' ? '목 구조 변경' : '예산액 조정');
            const [files, setFiles] = React.useState([]);

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[80]">
                    <div className="bg-white p-6 rounded shadow-lg w-96">
                        <h3 className="font-bold mb-4">변경사항 일괄 저장</h3>
                        <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="w-full border p-2 mb-2 rounded" />
                        <input type="text" value={desc} onChange={e=>setDesc(e.target.value)} className="w-full border p-2 mb-4 rounded" />
                        <div className="mb-4">
                            <label className="text-xs block font-bold mb-1">증빙 파일 (PDF, 5MB 이하)</label>
                            <input type="file" multiple accept=".pdf" onChange={async e => {
                                let fls = [];
                                for(let f of e.target.files) {
                                    if(f.size > 5 * 1024 * 1024) { showAlert("파일 용량 초과 (5MB 이하)"); return; }
                                    fls.push({id: 'f_'+Date.now() + '_' + Math.random().toString(36).substr(2, 9), name: f.name, file: f});
                                }
                                setFiles(fls);
                            }} className="w-full text-xs" />
                        </div>
                        <div className="flex justify-end space-x-2">
                            <button onClick={onClose} className="bg-gray-200 px-3 py-1 rounded">취소</button>
                            <button onClick={() => onConfirm(date, desc, files)} className="bg-red-600 text-white px-3 py-1 rounded">확정 저장</button>
                        </div>
                    </div>
                </div>
            );
        };

        const HistoryTab = ({ transactions, budgets, onPrint, onDelete, onView, onDownload }) => {
            const getPath = (bid) => {
                const i = budgets.find(b => b.id === bid);
                return i ? `[${i.subTitle}] ${i.title}` : '삭제됨';
            };
            return (
                <div className="bg-white rounded shadow p-6">
                    <div className="flex justify-between mb-4">
                        <h2 className="text-xl font-bold">거래 내역 장부</h2>
                        <button onClick={onPrint} className="bg-gray-200 px-3 py-1 rounded"><i className="fa-solid fa-print"></i></button>
                    </div>
                    <table className="w-full text-xs">
                        <thead className="table-header">
                            <tr>
                                <th>일자</th><th>구분</th><th>적요</th><th>항목</th><th>금액</th><th>관리</th>
                            </tr>
                        </thead>
                        <tbody>
                            {transactions.sort((a,b) => b.date.localeCompare(a.date)).map(t => (
                                (t.items || []).map((it, idx) => (
                                    <tr key={t.id+'_'+idx} className="border-b hover:bg-gray-50">
                                        <td className="p-2 text-center">{idx === 0 ? t.date : ''}</td>
                                        <td className="p-2 text-center">{idx === 0 ? (t.type === 'requisition' ? '품의' : '지출') : ''}</td>
                                        <td className="p-2 font-bold">{idx === 0 ? t.description : ''}</td>
                                        <td className="p-2">{getPath(it.budgetId)}</td>
                                        <td className="p-2 text-right">{formatKRW(it.amount)}</td>
                                        <td className="p-2 text-center space-x-2">
                                            {idx === 0 && t.attachedFiles && t.attachedFiles.map(f => (
                                                <span key={f.id} className="inline-flex space-x-1">
                                                    <button onClick={() => onView(f.id, f.name)} className="text-blue-500" title="열람"><i className="fa-solid fa-eye"></i></button>
                                                    <button onClick={() => onDownload(f.id, f.name)} className="text-green-600" title="다운로드"><i className="fa-solid fa-download"></i></button>
                                                </span>
                                            ))}
                                            {idx === 0 && <button onClick={() => onDelete(t.id)} className="text-red-400" title="삭제"><i className="fa-solid fa-trash-can"></i></button>}
                                        </td>
                                    </tr>
                                ))
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        };

        const ChartTab = ({ transactions, year }) => {
            const ref = React.useRef(null);
            React.useEffect(() => {
                const ctx = ref.current.getContext('2d');
                const months = ['3월','4월','5월','6월','7월','8월','9월','10월','11월','12월','1월','2월'];
                const data = new Array(12).fill(0);
                transactions.forEach(t => {
                    const m = new Date(t.date).getMonth() + 1;
                    let idx = m - 3; if(idx < 0) idx += 12;
                    if(t.type === 'expenditure') data[idx] += t.items.reduce((s,i) => s + i.amount, 0);
                });
                const chart = new Chart(ctx, {
                    type: 'bar',
                    data: { labels: months, datasets: [{ label: '월별 지출액', data, backgroundColor: 'rgba(59, 130, 246, 0.5)', borderColor: 'blue', borderWidth: 1 }] },
                    options: { maintainAspectRatio: false }
                });
                return () => chart.destroy();
            }, [transactions]);
            return (
                <div className="bg-white rounded shadow p-6 h-96">
                    <h2 className="text-xl font-bold mb-4">{year}학년도 월별 집행 현황</h2>
                    <div className="h-64"><canvas ref={ref}></canvas></div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
