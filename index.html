<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sazabi Master OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    body, html { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; height: 100%; margin: 0; overflow: hidden; background-color: #f8fafc; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    
    .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }

    /* 💡 결함 발생 시 정적이고 강렬한 붉은색 테두리 (애니메이션 없음) */
    .error-box { position: relative; }
    .error-box::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      border: 2px solid #ef4444; pointer-events: none; z-index: 10;
    }

    .marquee-container { width: 140px; overflow: hidden; position: relative; white-space: nowrap; display: flex; align-items: center; }
    .marquee-content { display: inline-block; padding-left: 100%; animation: scroll-left 6s linear infinite; }
    @keyframes scroll-left { 0% { transform: translateX(0%); } 100% { transform: translateX(-100%); } }
    
    /* Sticky 헤더 픽스 */
    .table-container { height: 100%; overflow-y: auto; position: relative; }
    table { width: 100%; border-collapse: separate; border-spacing: 0; }
    th { position: sticky; top: 0; z-index: 20; }
    th.sub-header { top: 36px; z-index: 19; } /* 2번째 줄 헤더 */
    
    /* 일반 테두리 처리 (border-collapse: separate 일 때 테두리 유지) */
    th, td { border-bottom: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; }
    th:first-child, td:first-child { border-left: 1px solid #e2e8f0; }
    tr:first-child th { border-top: 1px solid #e2e8f0; }
  </style>
</head>
<body>
  <div id="root" class="h-full"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    const GRADE_GROUP_DATA = {
      '1-2': {
        grades: [1, 2], total: 1744,
        groups: [
          { id: 'korean', name: '국어', subjects: ['korean'], std: 482 },
          { id: 'math', name: '수학', subjects: ['math'], std: 256 },
          { id: 'integrated', name: '바/슬/즐', subjects: ['disciplined', 'wise', 'pleasant'], std: 768 },
          { id: 'creative', name: '창체', subjects: ['creative_auto', 'creative_club', 'creative_career'], std: 238 }
        ]
      },
      '3-4': {
        grades: [3, 4], total: 1972,
        groups: [
          { id: 'korean', name: '국어', subjects: ['korean'], std: 408 },
          { id: 'social_moral', name: '사회/도덕', subjects: ['social', 'moral'], std: 272 },
          { id: 'math', name: '수학', subjects: ['math'], std: 272 },
          { id: 'science', name: '과학', subjects: ['science'], std: 204 },
          { id: 'physical', name: '체육', subjects: ['physical'], std: 204 },
          { id: 'arts', name: '예술(음/미)', subjects: ['music', 'art'], std: 272 },
          { id: 'english', name: '영어', subjects: ['english'], std: 136 },
          { id: 'creative', name: '창체', subjects: ['creative_auto', 'creative_club', 'creative_career'], std: 204 }
        ]
      },
      '5-6': {
        grades: [5, 6], total: 2176,
        groups: [
          { id: 'korean', name: '국어', subjects: ['korean'], std: 408 },
          { id: 'social_moral', name: '사회/도덕', subjects: ['social', 'moral'], std: 272 },
          { id: 'math', name: '수학', subjects: ['math'], std: 272 },
          { id: 'science_practical', name: '과학/실과', subjects: ['science', 'practical'], std: 340 },
          { id: 'physical', name: '체육', subjects: ['physical'], std: 204 },
          { id: 'arts', name: '예술(음/미)', subjects: ['music', 'art'], std: 272 },
          { id: 'english', name: '영어', subjects: ['english'], std: 204 },
          { id: 'creative', name: '창체', subjects: ['creative_auto', 'creative_club', 'creative_volunteer', 'creative_career'], std: 204 }
        ]
      }
    };

    const SUBJECT_NAME = {
      korean: '국어', social: '사회', moral: '도덕', math: '수학', science: '과학',
      practical: '실과', physical: '체육', music: '음악', art: '미술', english: '영어',
      disciplined: '바른생활', wise: '슬기로운생활', pleasant: '즐거운생활',
      creative_auto: '자율활동', creative_club: '동아리', creative_volunteer: '봉사활동', creative_career: '진로활동'
    };

    const getGroupOfGrade = (grade) => {
      if (grade <= 2) return '1-2';
      if (grade <= 4) return '3-4';
      return '5-6';
    };

    const getAllSubjects = (groupId) => {
      let subs = [];
      GRADE_GROUP_DATA[groupId].groups.forEach(g => {
        g.subjects.forEach(s => subs.push({ id: s, name: SUBJECT_NAME[s], group: g.name }));
      });
      return subs;
    };

    function App() {
      const [activeTab, setActiveTab] = useState('시수편제');
      const [selectedCohort, setSelectedCohort] = useState(1); // 1~6, 'all'
      const [isDarkMode, setIsDarkMode] = useState(false);
      const [modalState, setModalState] = useState({ isOpen: false, grade: null, editingId: null });
      const [formData, setFormData] = useState({ linkedSub: '', name: '' });

      const [cohorts, setCohorts] = useState(() => {
        const initial = {};
        [1, 2, 3, 4, 5, 6].forEach(cId => {
          const groupId = getGroupOfGrade(cId);
          const [g1, g2] = GRADE_GROUP_DATA[groupId].grades;
          initial[cId] = { hours: { [g1]: {}, [g2]: {} }, autoTimes: [] };
          
          GRADE_GROUP_DATA[groupId].groups.forEach(gInfo => {
            gInfo.subjects.forEach(sub => {
              if (groupId === '1-2') {
                const pdfData = {
                  1: { korean:{s1:124, s2:120}, math:{s1:60, s2:68}, disciplined:{s1:33, s2:34}, wise:{s1:50, s2:56}, pleasant:{s1:91, s2:96}, creative_auto:{s1:70, s2:40}, creative_club:{s1:8, s2:9}, creative_career:{s1:0, s2:0} },
                  2: { korean:{s1:118, s2:120}, math:{s1:64, s2:64}, disciplined:{s1:40, s2:37}, wise:{s1:60, s2:58}, pleasant:{s1:106, s2:107}, creative_auto:{s1:43, s2:42}, creative_club:{s1:6, s2:6}, creative_career:{s1:0, s2:5} }
                };
                initial[cId].hours[1][sub] = pdfData[1][sub] || {s1:0, s2:0};
                initial[cId].hours[2][sub] = pdfData[2][sub] || {s1:0, s2:0};
              } else {
                const perSem = Math.floor(gInfo.std / gInfo.subjects.length / 4);
                const remainder = (gInfo.std / gInfo.subjects.length) - (perSem * 4);
                initial[cId].hours[g1][sub] = { s1: perSem, s2: perSem };
                initial[cId].hours[g2][sub] = { s1: perSem, s2: perSem + Math.round(remainder) };
              }
            });
          });
        });
        return initial;
      });

      const handleInput = (cohortId, grade, sub, sem, val) => {
        const strVal = String(val).replace(/^0+/, ''); 
        let num = strVal === '' ? 0 : parseInt(strVal, 10);
        if (num < 0) num = 0;
        setCohorts(prev => ({
          ...prev,
          [cohortId]: {
            ...prev[cohortId],
            hours: { ...prev[cohortId].hours, [grade]: { ...prev[cohortId].hours[grade], [sub]: { ...prev[cohortId].hours[grade][sub], [sem]: num } } }
          }
        }));
      };

      const handleAutoTimeHours = (cohortId, id, sem, val) => {
        const strVal = String(val).replace(/^0+/, '');
        let num = strVal === '' ? 0 : parseInt(strVal, 10);
        if (num < 0) num = 0;
        setCohorts(prev => ({
          ...prev,
          [cohortId]: {
            ...prev[cohortId],
            autoTimes: prev[cohortId].autoTimes.map(item => item.id === id ? { ...item, [sem]: num } : item)
          }
        }));
      };

      const openModal = (grade, editId = null) => {
        const cohortTimes = cohorts[selectedCohort].autoTimes;
        if (!editId && cohortTimes.filter(a => a.grade === grade).length >= 2) return alert(`${grade}학년 자율시간은 최대 2개까지만 추가할 수 있습니다.`);
        if (editId) {
          const item = cohortTimes.find(a => a.id === editId);
          setFormData({ linkedSub: item.linkedSub, name: item.name });
        } else setFormData({ linkedSub: '', name: '' });
        setModalState({ isOpen: true, grade, editingId: editId });
      };

      const saveModal = () => {
        if (!formData.linkedSub || !formData.name.trim()) return alert('연계 교과와 자율시간 과목명을 입력해주세요.');
        setCohorts(prev => {
          const newTimes = modalState.editingId 
            ? prev[selectedCohort].autoTimes.map(item => item.id === modalState.editingId ? { ...item, linkedSub: formData.linkedSub, name: formData.name } : item)
            : [...prev[selectedCohort].autoTimes, { id: Date.now().toString(), grade: modalState.grade, linkedSub: formData.linkedSub, name: formData.name, s1: 0, s2: 0 }];
          return { ...prev, [selectedCohort]: { ...prev[selectedCohort], autoTimes: newTimes } };
        });
        setModalState({ isOpen: false, grade: null, editingId: null });
      };

      const deleteAutoTime = (cohortId, id) => {
        if(confirm('자율시간을 삭제하시겠습니까?')) {
          setCohorts(prev => ({ ...prev, [cohortId]: { ...prev[cohortId], autoTimes: prev[cohortId].autoTimes.filter(a => a.id !== id) } }));
        }
      };

      const analyzeCohort = (cohortId) => {
        if (cohortId === 'all') return null;
        const cohort = cohorts[cohortId];
        const groupId = getGroupOfGrade(cohortId);
        const config = GRADE_GROUP_DATA[groupId];
        const [g1, g2] = config.grades;
        
        let groupTotal = 0;
        const groupStats = config.groups.map(g => {
          let sum = g.subjects.reduce((s, sub) => s + cohort.hours[g1][sub].s1 + cohort.hours[g1][sub].s2 + cohort.hours[g2][sub].s1 + cohort.hours[g2][sub].s2, 0);
          cohort.autoTimes.forEach(auto => {
            if (g.subjects.includes(auto.linkedSub)) sum += auto.s1 + auto.s2;
          });
          groupTotal += sum;
          const diff = sum - g.std;
          const variancePercent = g.std === 0 ? 0 : Math.round((diff / g.std) * 100);
          const isOver20 = variancePercent > 20;
          const isUnder20 = variancePercent < -20;
          return { ...g, current: sum, diff, variancePercent, isOver20, isUnder20 };
        });

        const isTotalDeficient = groupTotal < config.total;
        const hasAnyError = isTotalDeficient || groupStats.some(g => g.isOver20 || g.isUnder20);
        return { groupStats, groupTotal, targetTotal: config.total, grades: [g1, g2], isTotalDeficient, hasAnyError };
      };

      const currentAnalysis = selectedCohort !== 'all' ? analyzeCohort(selectedCohort) : null;

      const extractCurrentYearData = () => {
        const currentYearHours = {};
        const currentYearAutoTimes = [];
        const cohortErrors = {};

        [1,2,3,4,5,6].forEach(cId => {
          currentYearHours[cId] = cohorts[cId].hours[cId];
          cohorts[cId].autoTimes.forEach(auto => {
            if (auto.grade === cId) currentYearAutoTimes.push({ ...auto, cohortId: cId });
          });
          cohortErrors[cId] = analyzeCohort(cId).hasAnyError;
        });
        return { hours: currentYearHours, autoTimes: currentYearAutoTimes, errors: cohortErrors };
      };

      return (
        <div className={`h-full ${isDarkMode ? 'dark' : ''}`}>
          <div className="flex h-screen text-slate-800 dark:text-slate-200 bg-slate-50 dark:bg-slate-950 overflow-hidden relative">
            
            <aside className="w-56 bg-slate-900 dark:bg-black flex flex-col shadow-2xl z-20 shrink-0 border-r border-slate-800">
              <div className="p-5 border-b border-slate-800 flex items-center gap-2">
                <i className="fa-solid fa-shield-halved text-blue-500 text-lg"></i>
                <h1 className="text-white font-black text-base uppercase tracking-tight">Sazabi OS</h1>
              </div>
              <nav className="flex-grow p-3 space-y-2 overflow-y-auto custom-scrollbar">
                <MenuBtn icon="fa-table" label="시수편제" active={activeTab === '시수편제'} onClick={() => setActiveTab('시수편제')} />
                <MenuBtn icon="fa-gear" label="시스템설정" active={activeTab === '설정'} onClick={() => setActiveTab('설정')} />
              </nav>
              <div className="p-4 bg-slate-950 dark:bg-slate-900 border-t border-slate-800 flex items-center gap-3">
                <i className="fa-solid fa-user-tie text-slate-400 text-sm"></i>
                <span className="text-slate-300 text-xs font-bold">사자비 부장</span>
              </div>
            </aside>

            <main className="flex-grow flex flex-col min-w-0 relative">
              <header className="h-16 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-6 shadow-sm z-10 shrink-0">
                <div className="flex items-center gap-4">
                  {activeTab === '시수편제' && (
                    <div className="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-lg border border-slate-200 dark:border-slate-700 shadow-sm">
                      {[1, 2, 3, 4, 5, 6].map(g => (
                        <button key={g} onClick={() => setSelectedCohort(g)} className={`px-4 py-1.5 rounded-md text-sm font-bold transition-all ${selectedCohort === g ? 'bg-white dark:bg-slate-700 text-blue-600 dark:text-blue-400 shadow-sm border border-slate-300 dark:border-slate-600' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700'}`}>
                          {g}학년
                        </button>
                      ))}
                      <button onClick={() => setSelectedCohort('all')} className={`ml-2 px-5 py-1.5 rounded-md text-sm font-bold transition-all ${selectedCohort === 'all' ? 'bg-slate-700 text-white shadow-md' : 'bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-300'}`}>
                        전체보기
                      </button>
                    </div>
                  )}
                </div>
              </header>

              <div className="flex-grow p-5 overflow-hidden flex flex-col bg-slate-50 dark:bg-slate-950">
                {activeTab === '시수편제' && selectedCohort !== 'all' && currentAnalysis && (
                  <CurriculumScreen 
                    cohortId={selectedCohort} analysis={currentAnalysis} cohortData={cohorts[selectedCohort]} 
                    handleInput={handleInput} openModal={openModal} handleAutoTimeHours={handleAutoTimeHours} deleteAutoTime={deleteAutoTime}
                  />
                )}
                {activeTab === '시수편제' && selectedCohort === 'all' && (
                  <AllGradesDetailedScreen extractedData={extractCurrentYearData()} />
                )}
                {activeTab === '설정' && <SettingsScreen isDarkMode={isDarkMode} setIsDarkMode={setIsDarkMode} />}
              </div>
            </main>
          </div>

          {/* 자율시간 팝업 */}
          {modalState.isOpen && (
            <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm z-[60] flex items-center justify-center">
              <div className="bg-white dark:bg-slate-800 rounded-xl p-6 max-w-sm w-full shadow-2xl border border-slate-300 dark:border-slate-700">
                <h3 className="text-base font-bold mb-4 border-b dark:border-slate-700 pb-2"><i className="fa-solid fa-flask text-blue-500 mr-2"></i> {modalState.grade}학년 자율시간 추가</h3>
                <div className="space-y-3 mb-6">
                  <div>
                    <label className="block text-[11px] font-bold text-slate-500 mb-1">연계 교과</label>
                    <select value={formData.linkedSub} onChange={e => setFormData({...formData, linkedSub: e.target.value})} className="w-full p-2 border border-slate-300 rounded text-xs font-medium outline-none">
                      <option value="">-- 교과 선택 --</option>
                      {getAllSubjects(getGroupOfGrade(selectedCohort)).map(s => <option key={s.id} value={s.id}>[{s.group}] {s.name}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-[11px] font-bold text-slate-500 mb-1">과목명</label>
                    <input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full p-2 border border-slate-300 rounded text-xs font-bold outline-none" />
                  </div>
                </div>
                <div className="flex justify-end gap-2">
                  <button onClick={() => setModalState({isOpen: false})} className="px-4 py-2 bg-slate-200 font-bold rounded text-xs">취소</button>
                  <button onClick={saveModal} className="px-4 py-2 bg-blue-600 text-white font-bold rounded text-xs">적용</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    /** 💡 개별 코호트 편집 화면 (당해년도 + 차년도/전년도) */
    function CurriculumScreen({ cohortId, analysis, cohortData, handleInput, openModal, handleAutoTimeHours, deleteAutoTime }) {
      const [g1, g2] = analysis.grades;
      const isOdd = cohortId % 2 !== 0;
      const title1 = isOdd ? `${g1}학년 (당해년도)` : `${g1}학년 (전년도 실적)`;
      const title2 = isOdd ? `${g2}학년 (차년도 계획)` : `${g2}학년 (당해년도)`;

      return (
        <div className="flex-grow flex flex-col gap-3 overflow-hidden">
          <div className="flex justify-between items-center bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700 shrink-0">
            <h2 className="text-lg font-black">{cohortId}학년 코호트 기준 편제표</h2>
            <div className={`px-4 py-1.5 rounded border flex items-center gap-3 ${analysis.isTotalDeficient ? 'bg-red-50 border-red-400' : 'bg-slate-50 border-slate-200'}`}>
              <span className="text-xs font-bold text-slate-500">학년군 2년 총계</span>
              <span className={`text-base font-black ${analysis.isTotalDeficient ? 'text-red-600' : 'text-blue-700'}`}>{analysis.groupTotal} <span className="text-xs font-normal text-slate-400">/ {analysis.targetTotal}H</span></span>
            </div>
          </div>

          <div className="table-container bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl custom-scrollbar flex-grow p-1">
            <table>
              <thead className="bg-[#f8fafc] dark:bg-slate-800 text-slate-700 dark:text-slate-300 text-[12px] font-bold text-center">
                <tr>
                  <th rowSpan={2} className="py-2 px-1 w-20 border-b-2 border-slate-300 bg-slate-100 z-30">교과군</th>
                  <th rowSpan={2} className="py-2 px-1 w-24 border-b-2 border-slate-300 bg-slate-100 z-30">교과목</th>
                  <th colSpan={3} className="py-2 px-1 bg-blue-50 text-blue-800 border-b-2 border-blue-200 z-20">{title1}</th>
                  <th colSpan={3} className="py-2 px-1 bg-emerald-50 text-emerald-800 border-b-2 border-emerald-200 z-20">{title2}</th>
                  <th rowSpan={2} className="py-2 px-1 w-12 border-b-2 border-slate-300 bg-slate-100 z-30">기준</th>
                  <th rowSpan={2} className="py-2 px-1 w-12 border-b-2 border-slate-300 bg-slate-100 z-30">합계</th>
                  <th rowSpan={2} className="py-2 px-1 w-16 border-b-2 border-slate-300 bg-slate-100 z-30">증감</th>
                </tr>
                <tr className="bg-white text-[11px] text-slate-500">
                  <th className="sub-header py-1 w-12 border-b border-slate-200 bg-blue-50/50">1학기</th><th className="sub-header py-1 w-12 border-b border-slate-200 bg-blue-50/50">2학기</th><th className="sub-header py-1 w-10 bg-blue-100/50 text-slate-600 border-b border-slate-200">소계</th>
                  <th className="sub-header py-1 w-12 border-b border-slate-200 bg-emerald-50/50">1학기</th><th className="sub-header py-1 w-12 border-b border-slate-200 bg-emerald-50/50">2학기</th><th className="sub-header py-1 w-10 bg-emerald-100/50 text-slate-600 border-b border-slate-200">소계</th>
                </tr>
              </thead>
              <tbody className="text-center text-[12px] text-slate-800 bg-white">
                {analysis.groupStats.map((group) => {
                  const hasError = group.isOver20 || group.isUnder20;
                  const groupAutoTimes = cohortData.autoTimes.filter(a => group.subjects.includes(a.linkedSub));
                  const rowSpanCount = group.subjects.length + groupAutoTimes.length;

                  return (
                    <React.Fragment key={group.id}>
                      {group.subjects.map((sub, idx) => {
                        const s1_1 = cohortData.hours[g1][sub].s1; const s1_2 = cohortData.hours[g1][sub].s2;
                        const s2_1 = cohortData.hours[g2][sub].s1; const s2_2 = cohortData.hours[g2][sub].s2;
                        const subAutoTimes = cohortData.autoTimes.filter(a => a.linkedSub === sub);
                        
                        let tdClasses = "p-1.5 align-middle ";
                        if (hasError) {
                          if (idx === 0) tdClasses += "border-t-2 border-t-red-500 ";
                          if (idx === group.subjects.length - 1 && subAutoTimes.length === 0) tdClasses += "border-b-2 border-b-red-500 ";
                        }

                        return (
                          <React.Fragment key={sub}>
                            <tr className={`hover:bg-slate-50 transition-colors ${hasError ? 'bg-red-50/10' : ''}`}>
                              {idx === 0 && (
                                <td rowSpan={rowSpanCount} className={`p-1.5 font-bold align-middle bg-slate-50/50 ${hasError ? 'border-t-2 border-b-2 border-l-2 border-red-500 text-red-600' : ''}`}>
                                  {group.name}
                                </td>
                              )}
                              <td className={`${tdClasses} font-medium`}>{SUBJECT_NAME[sub]}</td>
                              {/* 💡 수정한 부분: renderInput의 콜백을 분리하여 안전하게 호출 */}
                              {renderInput(s1_1, (val) => handleInput(cohortId, g1, sub, 's1', val), tdClasses)}
                              {renderInput(s1_2, (val) => handleInput(cohortId, g1, sub, 's2', val), tdClasses)}
                              <td className={`${tdClasses} font-bold text-slate-400 bg-slate-50/50`}>{s1_1 + s1_2}</td>
                              
                              {renderInput(s2_1, (val) => handleInput(cohortId, g2, sub, 's1', val), tdClasses)}
                              {renderInput(s2_2, (val) => handleInput(cohortId, g2, sub, 's2', val), tdClasses)}
                              <td className={`${tdClasses} font-bold text-slate-400 bg-slate-50/50`}>{s2_1 + s2_2}</td>
                              
                              {idx === 0 && (
                                <>
                                  <td rowSpan={rowSpanCount} className={`p-1.5 font-bold text-slate-400 ${hasError ? 'border-t-2 border-b-2 border-red-500' : ''}`}>{group.std}</td>
                                  <td rowSpan={rowSpanCount} className={`p-1.5 font-black text-[14px] ${hasError ? 'border-t-2 border-b-2 border-red-500 text-red-600' : 'text-blue-700'}`}>{group.current}</td>
                                  <td rowSpan={rowSpanCount} className={`p-1.5 font-bold text-[11px] ${hasError ? 'border-t-2 border-b-2 border-r-2 border-red-500 text-red-600' : 'text-slate-600'}`}>
                                    {group.diff > 0 ? `+${group.diff}` : group.diff}
                                    <div className="text-[9px] font-normal opacity-70">({group.variancePercent}%)</div>
                                  </td>
                                </>
                              )}
                            </tr>
                            {/* 학교 자율시간 서브로우 */}
                            {subAutoTimes.map((aTime, aIdx) => {
                              const isLast = (idx === group.subjects.length - 1) && (aIdx === subAutoTimes.length - 1);
                              let subTdClass = "p-1 text-left relative group/subrow h-[28px] overflow-hidden bg-blue-50/20 ";
                              if (hasError && isLast) subTdClass += "border-b-2 border-b-red-500 ";

                              return (
                                <tr key={aTime.id}>
                                  <td className={subTdClass}>
                                    <div className="flex items-center justify-between h-full px-1">
                                      <div className="marquee-container h-full">
                                        <div className="text-[10px] font-bold text-blue-600 marquee-content"><span className="text-slate-400 mr-0.5">└</span>[{aTime.grade}] {aTime.name}</div>
                                      </div>
                                      <div className="flex gap-1 opacity-0 group-hover/subrow:opacity-100 bg-white rounded shadow-sm absolute right-0.5 z-10">
                                        <button onClick={(e) => { e.stopPropagation(); openModal(aTime.grade, aTime.id); }} className="text-slate-400 hover:text-blue-600 px-1"><i className="fa-solid fa-pen text-[9px]"></i></button>
                                        <button onClick={(e) => { e.stopPropagation(); deleteAutoTime(cohortId, aTime.id); }} className="text-slate-400 hover:text-red-600 px-1"><i className="fa-solid fa-xmark text-[9px]"></i></button>
                                      </div>
                                    </div>
                                  </td>
                                  {aTime.grade === g1 ? (
                                    <>
                                      {renderInput(aTime.s1, (val) => handleAutoTimeHours(cohortId, aTime.id, 's1', val), subTdClass, true)}
                                      {renderInput(aTime.s2, (val) => handleAutoTimeHours(cohortId, aTime.id, 's2', val), subTdClass, true)}
                                      <td className={`${subTdClass} font-bold text-blue-500 text-center`}>{aTime.s1 + aTime.s2}</td>
                                      <td colSpan={3} className={subTdClass}></td>
                                    </>
                                  ) : (
                                    <>
                                      <td colSpan={3} className={subTdClass}></td>
                                      {renderInput(aTime.s1, (val) => handleAutoTimeHours(cohortId, aTime.id, 's1', val), subTdClass, true)}
                                      {renderInput(aTime.s2, (val) => handleAutoTimeHours(cohortId, aTime.id, 's2', val), subTdClass, true)}
                                      <td className={`${subTdClass} font-bold text-blue-500 text-center`}>{aTime.s1 + aTime.s2}</td>
                                    </>
                                  )}
                                </tr>
                              );
                            })}
                          </React.Fragment>
                        );
                      })}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div className="flex gap-3 shrink-0 p-1">
            <button onClick={() => openModal(g1)} className="flex-1 py-2 border border-dashed border-blue-400 bg-white text-blue-600 font-bold rounded text-xs hover:bg-blue-50 transition-colors">
              <i className="fa-solid fa-plus mr-1"></i> {g1}학년 자율시간 추가
            </button>
            <button onClick={() => openModal(g2)} className="flex-1 py-2 border border-dashed border-emerald-400 bg-white text-emerald-600 font-bold rounded text-xs hover:bg-emerald-50 transition-colors">
              <i className="fa-solid fa-plus mr-1"></i> {g2}학년 자율시간 추가
            </button>
          </div>
        </div>
      );
    }

    // 💡 오류의 핵심 원인이었던 인풋 컴포넌트! 콜백 함수를 단일하게 전달하도록 수정했습니다.
    function renderInput(value, onChangeVal, tdClass, isAuto=false) {
      return (
        <td className={`${tdClass}`}>
          <div className="flex items-center justify-center w-full h-full group">
            <button onClick={() => onChangeVal(Math.max(0, (value === '' ? 0 : value) - 1))} className="w-3 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i className="fa-solid fa-minus text-[9px]"></i></button>
            <input type="number" value={value === 0 ? '' : value} onChange={(e) => onChangeVal(e.target.value)} placeholder="0"
              className={`w-6 text-center font-bold text-[13px] bg-transparent focus:outline-none focus:bg-yellow-50 py-0.5 ${isAuto ? 'text-blue-600' : 'text-slate-800'}`} />
            <button onClick={() => onChangeVal((value === '' ? 0 : value) + 1)} className="w-3 text-slate-300 hover:text-blue-500 opacity-0 group-hover:opacity-100 transition-opacity"><i className="fa-solid fa-plus text-[9px]"></i></button>
          </div>
        </td>
      );
    }

    /** 💡 [전 학년 통합 전체보기 및 팝업 없는 HWP 출력 모듈] */
    function AllGradesDetailedScreen({ extractedData }) {
      const MATRIX_ROWS = [
        { group: '국어', subs: ['korean'] }, { group: '수학', subs: ['math'] }, { group: '바/슬/즐', subs: ['disciplined', 'wise', 'pleasant'] },
        { group: '사회/도덕', subs: ['social', 'moral'] }, { group: '과학/실과', subs: ['science', 'practical'] },
        { group: '체육', subs: ['physical'] }, { group: '예술(음/미)', subs: ['music', 'art'] }, { group: '영어', subs: ['english'] },
        { group: '창체', subs: ['creative_auto', 'creative_club', 'creative_volunteer', 'creative_career'] }
      ];

      const getCellVal = (grade, sub) => (extractedData.hours[grade] && extractedData.hours[grade][sub] !== undefined) ? extractedData.hours[grade][sub].s1 + extractedData.hours[grade][sub].s2 : '';
      const getAutoTimeVal = (grade) => extractedData.autoTimes.filter(a => a.grade === grade).reduce((s, a) => s + a.s1 + a.s2, 0);

      const exportToHWP = () => {
        const header = `<html xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
        <head><meta charset="utf-8"><title>편제표</title>
        <style>table { border-collapse: collapse; width: 100%; text-align: center; font-size: 10pt; font-family: '맑은 고딕', sans-serif; border: 2px solid black; } th, td { border: 1px solid black; padding: 5px; vertical-align: middle; } th { background-color: #f1f5f9; font-weight: bold; } .g-name { background-color: #f8fafc; font-weight: bold; } .total { background-color: #e2e8f0; font-weight: bold; }</style></head><body>
        <h2 style="text-align:center; font-family:'맑은 고딕'; margin-bottom:20px;">당해년도 전 학년 교육과정 시수 편제표</h2><table>`;
        const thead = `<thead><tr><th rowspan="2">교과군</th><th rowspan="2">교과목</th><th colspan="6">학년별 당해년도 편성 시수</th></tr><tr><th>1학년</th><th>2학년</th><th>3학년</th><th>4학년</th><th>5학년</th><th>6학년</th></tr></thead><tbody>`;
        
        let tbody = ``;
        MATRIX_ROWS.forEach(group => {
          group.subs.forEach((sub, idx) => {
            tbody += `<tr>`;
            if (idx === 0) tbody += `<td rowspan="${group.subs.length}" class="g-name">${group.group}</td>`;
            tbody += `<td>${SUBJECT_NAME[sub]}</td>`;
            [1,2,3,4,5,6].forEach(g => { const val = getCellVal(g, sub); tbody += `<td>${val === 0 || val === '' ? '-' : val}</td>`; });
            tbody += `</tr>`;
          });
        });
        tbody += `<tr><td colspan="2" class="g-name" style="color:blue;">학교 자율시간 누계</td>`;
        [1,2,3,4,5,6].forEach(g => { const val = getAutoTimeVal(g); tbody += `<td style="color:blue; font-weight:bold;">${val === 0 ? '-' : val}</td>`; });
        tbody += `</tr><tr class="total"><td colspan="2">총계</td>`;
        [1,2,3,4,5,6].forEach(g => {
           let total = getAutoTimeVal(g);
           MATRIX_ROWS.forEach(gr => gr.subs.forEach(sub => { const val = getCellVal(g, sub); if(val !== '') total += val; }));
           tbody += `<td>${total}</td>`;
        });
        tbody += `</tr></tbody></table></body></html>`;

        const blob = new Blob(['\ufeff' + header + thead + tbody], { type: 'application/msword;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url; link.download = `전학년_당해년도_편제표.doc`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      };

      return (
        <div className="flex-grow flex flex-col gap-4 overflow-hidden">
          <div className="flex justify-between items-center bg-white p-6 rounded-xl border border-slate-200 shrink-0 shadow-sm">
            <div>
              <h2 className="text-xl font-black">전체보기 (행=교과, 열=학년)</h2>
            </div>
            <button onClick={exportToHWP} className="px-5 py-2.5 bg-slate-900 hover:bg-black text-white font-bold rounded-lg shadow-md flex items-center gap-2 transition-colors">
              <i className="fa-solid fa-file-word"></i> 출력하기
            </button>
          </div>

          <div className="table-container bg-white border border-slate-300 rounded-xl custom-scrollbar flex-grow p-1">
            <table>
              <thead className="bg-[#f8fafc] text-slate-700 text-[12px] font-bold text-center">
                <tr>
                  <th rowSpan={2} className="py-2 px-2 w-20 border-b-2 border-slate-300 bg-slate-100 z-30">교과군</th>
                  <th rowSpan={2} className="py-2 px-2 w-24 border-b-2 border-slate-300 bg-slate-100 z-30">교과목</th>
                  <th colSpan={6} className="py-2 px-2 border-b-2 border-slate-300 bg-slate-50 z-20">당해년도 편성 시수 (결함 코호트 붉은색 표시)</th>
                </tr>
                <tr className="bg-white text-[11px] text-slate-500">
                  {[1,2,3,4,5,6].map(g => (
                    <th key={g} className={`sub-header py-1 w-16 border-b border-slate-200 ${extractedData.errors[g] ? 'bg-red-100 text-red-700 border-x-2 border-t-2 border-red-500' : 'bg-slate-50'}`}>{g}학년</th>
                  ))}
                </tr>
              </thead>
              <tbody className="text-center text-[12px] text-slate-800 bg-white">
                {MATRIX_ROWS.map(group => (
                  <React.Fragment key={group.group}>
                    {group.subs.map((sub, idx) => (
                      <tr key={sub} className="hover:bg-slate-50 transition-colors">
                        {idx === 0 && <td rowSpan={group.subs.length} className="p-1.5 align-middle bg-slate-50/50 font-bold border-b border-r border-slate-200">{group.group}</td>}
                        <td className="p-1.5 font-medium border-b border-r border-slate-200">{SUBJECT_NAME[sub]}</td>
                        {[1,2,3,4,5,6].map(g => {
                          const val = getCellVal(g, sub);
                          const errClass = extractedData.errors[g] ? 'border-x-2 border-red-500 bg-red-50/20 text-red-700 font-bold ' : 'border-r border-slate-200 ';
                          return <td key={g} className={`p-1.5 border-b border-slate-200 ${errClass}`}>{val === '' || val === 0 ? '-' : val}</td>;
                        })}
                      </tr>
                    ))}
                  </React.Fragment>
                ))}
                <tr className="bg-blue-50/30 font-bold text-blue-800 border-y-2 border-slate-300">
                  <td colSpan="2" className="p-2 border-r border-slate-200"><i className="fa-solid fa-flask mr-1"></i> 자율시간 누계</td>
                  {[1,2,3,4,5,6].map(g => {
                    const errClass = extractedData.errors[g] ? 'border-x-2 border-b-2 border-red-500 bg-red-50/20 text-red-700 ' : 'border-r border-slate-200 ';
                    return <td key={g} className={`p-2 ${errClass}`}>{getAutoTimeVal(g) === 0 ? '-' : getAutoTimeVal(g)}</td>
                  })}
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function SettingsScreen({ isDarkMode, setIsDarkMode }) { return (<div className="p-6 text-center text-slate-500">설정 모듈 적용 중</div>); }

    function MenuBtn({ icon, label, active, onClick }) {
      return (
        <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${active ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-800'}`}>
          <i className={`fa-solid ${icon} w-4 text-center text-sm`}></i> <span className="text-sm font-bold">{label}</span>
        </button>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
