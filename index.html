<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장성글로컬교육센터 예산 관리</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-storage-compat.js"></script>

    <style>
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background-color: #f3f4f6; }
        .table-header th { background-color: #4b5563; color: white; padding: 0.75rem; border: 1px solid #6b7280; text-align: center; font-weight: 500;}
        .table-cell { padding: 0.5rem; border: 1px solid #d1d5db; text-align: right; }
        .table-cell-text { padding: 0.5rem; border: 1px solid #d1d5db; text-align: left; }
        .row-group { background-color: #f9fafb; font-weight: bold; }
        .row-subgroup { background-color: #ffffff; font-weight: 600; padding-left: 1.5rem !important; }
        .row-item { background-color: #ffffff; padding-left: 2.5rem !important; color: #374151; }
        
        /* Print Styles */
        @media print {
            body { background-color: white; }
            .no-print { display: none !important; }
            .print-full-width { width: 100% !important; max-width: none !important; margin: 0 !important; padding: 0 !important; box-shadow: none !important; }
            table { font-size: 10px; width: 100%; border-collapse: collapse; }
            th, td { border: 1px solid black !important; }
            .table-header th { background-color: #e5e7eb !important; color: black !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // Firebase Configuration Area
        // ==========================================
        const USER_FIREBASE_CONFIG = {
            apiKey: "AIzaSyCVG6f1IazVcq7hPc_RYlZAxX8z8ZqN0_k",
            authDomain: "jgec-budgets.firebaseapp.com",
            projectId: "jgec-budgets",
            storageBucket: "jgec-budgets.firebasestorage.app",
            messagingSenderId: "624606043611",
            appId: "1:624606043611:web:414f3e46ed761caf719bfe"
        };

        let firebaseApp, auth, db, storage;
        let isUsingCustomConfig = false;
        try {
            const hasUserConfig = USER_FIREBASE_CONFIG && USER_FIREBASE_CONFIG.apiKey && USER_FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY";
            const configToUse = hasUserConfig ? USER_FIREBASE_CONFIG : (typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {});
            
            if (Object.keys(configToUse).length > 0) {
                firebaseApp = firebase.initializeApp(configToUse);
                auth = firebase.auth();
                db = firebase.firestore();
                storage = firebase.storage();
                isUsingCustomConfig = hasUserConfig;
            }
        } catch (error) {
            console.error("Firebase initialization error:", error);
        }

        const getAppId = () => typeof __app_id !== 'undefined' ? __app_id : 'jangseong-glocal-budget';

        // ==========================================
        // Initial Data
        // ==========================================
        const INITIAL_BUDGET_DATA = [
            { id: '1', parent: null, title: '외국어 교과활동', type: 'category', amount: 180979000 },
            { id: '2', parent: '1', title: '[초] 영어교과운영', type: 'sub', amount: 800000 },
            { id: '3', parent: '2', title: '영어체험교실운영물품 구입', subTitle: '교육운영비', type: 'item', amount: 400000 },
            { id: '4', parent: '2', title: '영어특색교육활동 및 캠프운영물품 구입', subTitle: '교육운영비', type: 'item', amount: 400000 },
            { id: '5', parent: '1', title: '[초] 원어민보조교사운영', type: 'sub', amount: 26900000 },
            { id: '6', parent: '5', title: '원어민주거지원비', subTitle: '일반수용비', type: 'item', amount: 2800000 },
            { id: '7', parent: '5', title: '원어민보조교사순회수당(학)', subTitle: '운영수당', type: 'item', amount: 0 },
            { id: '8', parent: '5', title: '원어민보조교사보험료', subTitle: '기간제교원법정부담금', type: 'item', amount: 1680000 },
            { id: '9', parent: '5', title: '원어민보조교사퇴직적립금(학)', subTitle: '기간제교원인건비', type: 'item', amount: 0 },
            { id: '10', parent: '5', title: '원어민보조교사수당', subTitle: '운영수당', type: 'item', amount: 22420000 },
            { id: '11', parent: '1', title: '[초] 글로컬교육센터운영(군)', type: 'sub', amount: 133474000 },
            { id: '12', parent: '11', title: '원어민보조교사 숙소 임차료', subTitle: '일반수용비', type: 'item', amount: 4000000 },
            { id: '13', parent: '11', title: '원어민보조교사 수당', subTitle: '운영수당', type: 'item', amount: 30000000 },
            { id: '14', parent: '11', title: '글로컬교육센터 법정부담금', subTitle: '기간제교원법정부담금', type: 'item', amount: 12699000 },
            { id: '15', parent: '11', title: '내부강사 수당', subTitle: '운영수당', type: 'item', amount: 60891000 },
            { id: '16', parent: '11', title: '운영보조원 수당', subTitle: '운영수당', type: 'item', amount: 25884000 },
            { id: '17', parent: '1', title: '[초] 글로컬교육센터운영(도)', type: 'sub', amount: 19805000 },
            { id: '18', parent: '17', title: '원어민주거지원비', subTitle: '일반수용비', type: 'item', amount: 2400000 },
            { id: '19', parent: '17', title: '원어민보조교사 수당', subTitle: '운영수당', type: 'item', amount: 15600000 },
            { id: '20', parent: '17', title: '원어민보조교사보험료 등', subTitle: '기간제교원법정부담금', type: 'item', amount: 1805000 },
        ];

        const formatKRW = (num) => {
            if (num === null || num === undefined || isNaN(num)) return '0';
            return parseInt(num, 10).toLocaleString('ko-KR');
        };

        const getFiscalYear = (date = new Date()) => {
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            return month < 3 ? year - 1 : year;
        };

        // ==========================================
        // UI Component: 공용 커스텀 모달
        // ==========================================
        const DialogModal = ({ isOpen, message, isAlert, onConfirm, onCancel }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-[100]">
                    <div className="bg-white rounded-xl p-6 w-[400px] shadow-2xl text-center">
                        <div className="mb-6">
                            {isAlert ? 
                                <i className="fa-solid fa-circle-exclamation text-red-500 text-4xl mb-4"></i> : 
                                <i className="fa-solid fa-circle-question text-blue-500 text-4xl mb-4"></i>
                            }
                            <p className="text-lg font-bold text-gray-800 whitespace-pre-wrap">{message}</p>
                        </div>
                        <div className="flex justify-center space-x-3">
                            {!isAlert && <button onClick={onCancel} className="px-6 py-2 bg-gray-200 text-gray-800 font-bold rounded hover:bg-gray-300 transition-colors">취소</button>}
                            <button onClick={onConfirm} className={`px-6 py-2 text-white font-bold rounded transition-colors ${isAlert ? 'bg-blue-600 hover:bg-blue-700' : 'bg-red-600 hover:bg-red-700'}`}>확인</button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = React.useState(null);
            const [activeTab, setActiveTab] = React.useState('overview');
            const [selectedYear, setSelectedYear] = React.useState(getFiscalYear());
            const [budgets, setBudgets] = React.useState([]);
            const [transactions, setTransactions] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [dbStatus, setDbStatus] = React.useState('connecting');
            
            const [dialog, setDialog] = React.useState({ isOpen: false, message: '', isAlert: false, onConfirm: null });

            const showAlert = (message) => setDialog({ isOpen: true, message, isAlert: true, onConfirm: () => setDialog(prev => ({...prev, isOpen: false})) });
            const showConfirm = (message, onConfirmCallback) => setDialog({ isOpen: true, message, isAlert: false, onConfirm: () => { onConfirmCallback(); setDialog(prev => ({...prev, isOpen: false})); } });
            const closeDialog = () => setDialog(prev => ({ ...prev, isOpen: false }));

            React.useEffect(() => {
                if (!auth) {
                    setLoading(false);
                    setDbStatus('local');
                    initializeLocalData(selectedYear);
                    return;
                }

                const initAuth = async () => {
                    try {
                        if (!isUsingCustomConfig && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (error) {
                        setDbStatus('error');
                        setLoading(false);
                        initializeLocalData(selectedYear);
                    }
                };
                initAuth();

                const unsubscribe = auth.onAuthStateChanged((user) => {
                    setUser(user);
                    if (!user) setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            React.useEffect(() => {
                if (!auth || !user) return;
                const appId = getAppId();
                setLoading(true);
                setDbStatus('connected');

                const budgetRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`budgets_${selectedYear}`);
                const unsubBudgets = budgetRef.onSnapshot((snapshot) => {
                    if (snapshot.empty && selectedYear === 2026) {
                        INITIAL_BUDGET_DATA.forEach(item => {
                            budgetRef.doc(item.id).set({...item, requisitioned: 0, encumbered: 0, expended: 0});
                        });
                    } else {
                        const bData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setBudgets(bData.sort((a, b) => {
                            const intA = parseInt(a.id);
                            const intB = parseInt(b.id);
                            if(!isNaN(intA) && !isNaN(intB)) return intA - intB;
                            return a.id.localeCompare(b.id);
                        }));
                    }
                });

                const transRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`transactions_${selectedYear}`);
                const unsubTrans = transRef.onSnapshot((snapshot) => {
                    const tData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setTransactions(tData);
                    setLoading(false);
                });

                return () => { unsubBudgets(); unsubTrans(); };
            }, [user, selectedYear]);

            const initializeLocalData = (year) => {
                const bKey = `local_budgets_${year}`;
                const tKey = `local_trans_${year}`;
                if (!localStorage.getItem(bKey) && year === 2026) {
                    const initData = INITIAL_BUDGET_DATA.map(item => ({...item, requisitioned: 0, encumbered: 0, expended: 0}));
                    localStorage.setItem(bKey, JSON.stringify(initData));
                }
                setBudgets(JSON.parse(localStorage.getItem(bKey)) || []);
                setTransactions(JSON.parse(localStorage.getItem(tKey)) || []);
            };

            const saveLocalData = (newBudgets, newTransactions) => {
                localStorage.setItem(`local_budgets_${selectedYear}`, JSON.stringify(newBudgets));
                localStorage.setItem(`local_trans_${selectedYear}`, JSON.stringify(newTransactions));
            };

            // DB 파일 다운로드 (Storage 적용)
            const downloadAttachment = async (fileId, fileName) => {
                if (!auth || !user) { showAlert("로그인이 필요합니다."); return; }
                try {
                    const appId = getAppId();
                    const doc = await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`attachments_${selectedYear}`).doc(fileId).get();
                    if (doc.exists) {
                        const url = doc.data().url;
                        const response = await fetch(url);
                        const blob = await response.blob();
                        const blobUrl = URL.createObjectURL(blob);
                        
                        const a = document.createElement('a');
                        a.href = blobUrl;
                        a.download = fileName;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(blobUrl);
                    } else {
                        showAlert("서버에서 파일을 찾을 수 없습니다.");
                    }
                } catch (e) {
                    console.error("Download error", e);
                    showAlert("파일 다운로드 중 오류가 발생했습니다.");
                }
            };

            // DB 파일 브라우저 뷰어 열람 (Storage 적용)
            const viewAttachment = async (fileId, fileName) => {
                if (!auth || !user) { showAlert("로그인이 필요합니다."); return; }
                
                const newWindow = window.open('', '_blank');
                if (newWindow) {
                    newWindow.document.title = fileName;
                    newWindow.document.body.innerHTML = `
                        <div style="display:flex; justify-content:center; items-align:center; height:100vh; font-family:sans-serif;">
                            <h2>서버에서 문서를 불러오는 중입니다... 잠시만 기다려주세요.</h2>
                        </div>
                    `;
                } else {
                    showAlert("팝업 차단이 설정되어 있습니다. 브라우저 설정에서 팝업 차단을 해제해주세요.");
                    return;
                }

                try {
                    const appId = getAppId();
                    const doc = await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`attachments_${selectedYear}`).doc(fileId).get();
                    if (doc.exists) {
                        newWindow.location.href = doc.data().url;
                    } else {
                        newWindow.close();
                        showAlert("서버에서 파일을 찾을 수 없습니다.");
                    }
                } catch (e) {
                    console.error("View error", e);
                    newWindow.close();
                    showAlert("파일 열람 중 오류가 발생했습니다.");
                }
            };

            const handleTransaction = async (type, date, items, description, attachedFiles = []) => {
                const newTransId = Date.now().toString();
                const transactionRecord = { id: newTransId, date, type, items, description, timestamp: new Date().toISOString() };
                const budgetUpdates = {};
                
                items.forEach(item => {
                    if (!budgetUpdates[item.budgetId]) budgetUpdates[item.budgetId] = { req: 0, exp: 0 };
                    if (type === 'requisition') budgetUpdates[item.budgetId].req += item.amount;
                    if (type === 'expenditure') budgetUpdates[item.budgetId].exp += item.amount;
                });

                if (auth && user) {
                    const appId = getAppId();
                    const batch = db.batch();
                    const tRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`transactions_${selectedYear}`).doc(newTransId);
                    
                    let uploadedFilesMeta = [];
                    if (attachedFiles && attachedFiles.length > 0) {
                        for (const fileObj of attachedFiles) {
                            const filePath = `artifacts/${appId}/users/${user.uid}/attachments_${selectedYear}/${fileObj.id}_${fileObj.name}`;
                            const fileRef = storage.ref().child(filePath);
                            await fileRef.put(fileObj.file);
                            const url = await fileRef.getDownloadURL();
                            uploadedFilesMeta.push({ id: fileObj.id, name: fileObj.name, url, storagePath: filePath });
                        }
                    }

                    if (uploadedFilesMeta.length > 0) {
                        uploadedFilesMeta.forEach(meta => {
                            const fRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`attachments_${selectedYear}`).doc(meta.id);
                            batch.set(fRef, { url: meta.url, storagePath: meta.storagePath, name: meta.name, timestamp: new Date().toISOString() });
                        });
                        transactionRecord.attachedFiles = uploadedFilesMeta.map(f => ({ id: f.id, name: f.name }));
                    }

                    batch.set(tRef, transactionRecord);

                    budgets.forEach(b => {
                        if (budgetUpdates[b.id]) {
                            const bRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`budgets_${selectedYear}`).doc(String(b.id));
                            const updates = budgetUpdates[b.id];
                            batch.update(bRef, {
                                requisitioned: (b.requisitioned || 0) + updates.req,
                                expended: (b.expended || 0) + updates.exp
                            });
                        }
                    });
                    await batch.commit();
                } else {
                    let nextBudgets = budgets.map(b => {
                        if (budgetUpdates[b.id]) {
                            return { ...b, requisitioned: (b.requisitioned || 0) + budgetUpdates[b.id].req, expended: (b.expended || 0) + budgetUpdates[b.id].exp };
                        }
                        return b;
                    });
                    const nextTrans = [transactionRecord, ...transactions];
                    setBudgets(nextBudgets); setTransactions(nextTrans);
                    saveLocalData(nextBudgets, nextTrans);
                }
            };

            const handleBatchTransaction = async (mode, date, description, attachedFiles, draftBudgets) => {
                const newTransId = Date.now().toString();
                const transactionRecord = { id: newTransId, date, type: mode, description, timestamp: new Date().toISOString() };
                
                const oldMap = new Map(budgets.map(b => [String(b.id), b]));
                const newMap = new Map(draftBudgets.map(b => [String(b.id), b]));

                let adjustedItems = [];
                if (mode === 'structure') {
                    const added = draftBudgets.filter(b => !oldMap.has(String(b.id)));
                    const deleted = budgets.filter(b => !newMap.has(String(b.id)));
                    const renamed = draftBudgets
                        .filter(b => oldMap.has(String(b.id)) && (oldMap.get(String(b.id)).title !== b.title || oldMap.get(String(b.id)).subTitle !== b.subTitle))
                        .map(b => ({
                            id: b.id,
                            newTitle: b.title, newSubTitle: b.subTitle || "",
                            oldTitle: oldMap.get(String(b.id)).title, oldSubTitle: oldMap.get(String(b.id)).subTitle || ""
                        }));
                    transactionRecord.structureChanges = { added, deleted, renamed };
                } 
                else if (mode === 'adjustment') {
                    draftBudgets.forEach(b => {
                        if (b.type === 'item') {
                            const oldDoc = oldMap.get(String(b.id));
                            const oldAmount = oldDoc ? Number(oldDoc.amount || 0) : 0;
                            const newAmount = Number(b.amount || 0);
                            
                            if (oldAmount !== newAmount) {
                                adjustedItems.push({ budgetId: String(b.id), amount: newAmount - oldAmount, newTotal: newAmount });
                            }
                        }
                    });
                    transactionRecord.items = adjustedItems;
                }

                if (auth && user) {
                    const appId = getAppId();
                    const batch = db.batch();
                    const tRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`transactions_${selectedYear}`).doc(newTransId);

                    let uploadedFilesMeta = [];
                    if (attachedFiles && attachedFiles.length > 0) {
                        for (const fileObj of attachedFiles) {
                            const filePath = `artifacts/${appId}/users/${user.uid}/attachments_${selectedYear}/${fileObj.id}_${fileObj.name}`;
                            const fileRef = storage.ref().child(filePath);
                            await fileRef.put(fileObj.file);
                            const url = await fileRef.getDownloadURL();
                            uploadedFilesMeta.push({ id: fileObj.id, name: fileObj.name, url, storagePath: filePath });
                        }
                    }

                    if (uploadedFilesMeta.length > 0) {
                        uploadedFilesMeta.forEach(meta => {
                            const fRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`attachments_${selectedYear}`).doc(meta.id);
                            batch.set(fRef, { url: meta.url, storagePath: meta.storagePath, name: meta.name, timestamp: new Date().toISOString() });
                        });
                        transactionRecord.attachedFiles = uploadedFilesMeta.map(f => ({ id: f.id, name: f.name }));
                    }

                    if (mode === 'structure') {
                        const { added, deleted, renamed } = transactionRecord.structureChanges;
                        added.forEach(b => {
                            const r = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`budgets_${selectedYear}`).doc(String(b.id));
                            batch.set(r, { ...b, subTitle: b.subTitle || "", requisitioned: 0, expended: 0, encumbered: 0 });
                        });
                        deleted.forEach(b => {
                            const r = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`budgets_${selectedYear}`).doc(String(b.id));
                            batch.delete(r);
                        });
                        renamed.forEach(b => {
                            const r = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`budgets_${selectedYear}`).doc(String(b.id));
                            batch.update(r, { title: b.newTitle, subTitle: b.newSubTitle });
                        });
                    } else if (mode === 'adjustment') {
                        adjustedItems.forEach(adj => {
                            const r = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`budgets_${selectedYear}`).doc(adj.budgetId);
                            batch.update(r, { amount: adj.newTotal });
                        });
                    }

                    batch.set(tRef, transactionRecord);
                    await batch.commit();
                } else {
                    let nextBudgets = [...budgets];
                    if (mode === 'structure') {
                        const { added, deleted, renamed } = transactionRecord.structureChanges;
                        const deletedIds = deleted.map(d => String(d.id));
                        nextBudgets = nextBudgets.filter(b => !deletedIds.includes(String(b.id)));
                        nextBudgets = [...nextBudgets, ...added.map(b => ({ ...b, subTitle: b.subTitle || "", requisitioned: 0, expended: 0, encumbered: 0 }))];
                        renamed.forEach(r => {
                            const idx = nextBudgets.findIndex(b => String(b.id) === String(r.id));
                            if (idx !== -1) { nextBudgets[idx] = { ...nextBudgets[idx], title: r.newTitle, subTitle: r.newSubTitle }; }
                        });
                    } else if (mode === 'adjustment') {
                        adjustedItems.forEach(adj => {
                            const idx = nextBudgets.findIndex(b => String(b.id) === adj.budgetId);
                            if (idx !== -1) { nextBudgets[idx] = { ...nextBudgets[idx], amount: adj.newTotal }; }
                        });
                    }
                    const nextTrans = [transactionRecord, ...transactions];
                    setBudgets(nextBudgets); setTransactions(nextTrans); saveLocalData(nextBudgets, nextTrans);
                }
            };

            const handleDeleteTransaction = async (transId) => {
                showConfirm('이 거래 내역을 삭제하고 예산 금액과 구조를 반영취소하시겠습니까?', async () => {
                    const transToDelete = transactions.find(t => t.id === transId);
                    if (!transToDelete) return;

                    if (auth && user) {
                        const appId = getAppId();
                        const batch = db.batch();
                        const tRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`transactions_${selectedYear}`).doc(transId);
                        batch.delete(tRef);

                        if (transToDelete.type === 'requisition' || transToDelete.type === 'expenditure' || transToDelete.type === 'adjustment') {
                            const budgetUpdates = {};
                            (transToDelete.items || []).forEach(item => {
                                if (!budgetUpdates[item.budgetId]) budgetUpdates[item.budgetId] = { req: 0, exp: 0, amtChange: 0 };
                                if (transToDelete.type === 'requisition') budgetUpdates[item.budgetId].req -= item.amount;
                                if (transToDelete.type === 'expenditure') budgetUpdates[item.budgetId].exp -= item.amount;
                                if (transToDelete.type === 'adjustment') budgetUpdates[item.budgetId].amtChange -= item.amount;
                            });

                            budgets.forEach(b => {
                                if (budgetUpdates[b.id]) {
                                    const bRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`budgets_${selectedYear}`).doc(String(b.id));
                                    const updates = budgetUpdates[b.id];
                                    batch.update(bRef, {
                                        requisitioned: (b.requisitioned || 0) + updates.req,
                                        expended: (b.expended || 0) + updates.exp,
                                        amount: (b.amount || 0) + updates.amtChange
                                    });
                                }
                            });
                        }

                        if (transToDelete.type === 'structure' && transToDelete.structureChanges) {
                            const { added, deleted, renamed } = transToDelete.structureChanges;
                            added.forEach(b => {
                                const r = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`budgets_${selectedYear}`).doc(String(b.id));
                                batch.delete(r);
                            });
                            deleted.forEach(b => {
                                const r = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`budgets_${selectedYear}`).doc(String(b.id));
                                batch.set(r, b);
                            });
                            renamed.forEach(b => {
                                const r = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`budgets_${selectedYear}`).doc(String(b.id));
                                batch.update(r, { title: b.oldTitle, subTitle: b.oldSubTitle });
                            });
                        }

                        // Storage 연동 삭제 적용
                        if (transToDelete.attachedFiles && transToDelete.attachedFiles.length > 0) {
                            for (const file of transToDelete.attachedFiles) {
                                const fRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`attachments_${selectedYear}`).doc(file.id);
                                const fDoc = await fRef.get();
                                if (fDoc.exists && fDoc.data().storagePath) {
                                    try { await storage.ref().child(fDoc.data().storagePath).delete(); } 
                                    catch(err) { console.error("Storage delete error:", err); }
                                }
                                batch.delete(fRef);
                            }
                        }
                        await batch.commit();
                    } else {
                        let nextBudgets = [...budgets];
                        if (transToDelete.type === 'requisition' || transToDelete.type === 'expenditure' || transToDelete.type === 'adjustment') {
                            const budgetUpdates = {};
                            (transToDelete.items || []).forEach(item => {
                                if (!budgetUpdates[item.budgetId]) budgetUpdates[item.budgetId] = { req: 0, exp: 0, amtChange: 0 };
                                if (transToDelete.type === 'requisition') budgetUpdates[item.budgetId].req -= item.amount;
                                if (transToDelete.type === 'expenditure') budgetUpdates[item.budgetId].exp -= item.amount;
                                if (transToDelete.type === 'adjustment') budgetUpdates[item.budgetId].amtChange -= item.amount;
                            });
                            nextBudgets = nextBudgets.map(b => {
                                if (budgetUpdates[b.id]) {
                                    const u = budgetUpdates[b.id];
                                    return { ...b, requisitioned: (b.requisitioned || 0) + u.req, expended: (b.expended || 0) + u.exp, amount: (b.amount || 0) + u.amtChange };
                                }
                                return b;
                            });
                        }
                        if (transToDelete.type === 'structure' && transToDelete.structureChanges) {
                            const { added, deleted, renamed } = transToDelete.structureChanges;
                            const addedIds = added.map(a => String(a.id));
                            nextBudgets = nextBudgets.filter(b => !addedIds.includes(String(b.id)));
                            nextBudgets = [...nextBudgets, ...deleted];
                            renamed.forEach(r => {
                                const idx = nextBudgets.findIndex(b => String(b.id) === String(r.id));
                                if (idx !== -1) { nextBudgets[idx] = { ...nextBudgets[idx], title: r.oldTitle, subTitle: r.oldSubTitle }; }
                            });
                        }
                        const nextTrans = transactions.filter(t => t.id !== transId);
                        setBudgets(nextBudgets); setTransactions(nextTrans); saveLocalData(nextBudgets, nextTrans);
                    }
                });
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <DialogModal {...dialog} onCancel={closeDialog} />
                    
                    <header className="bg-blue-800 text-white p-4 shadow-md no-print flex justify-between items-center">
                        <div className="flex items-center space-x-4">
                            <h1 className="text-2xl font-bold"><i className="fa-solid fa-school mr-2"></i>장성글로컬교육센터 예산 관리</h1>
                            <div className="bg-blue-700 rounded px-3 py-1 flex items-center space-x-3 shadow-inner">
                                <span className="text-sm text-blue-200 font-bold">회계연도:</span>
                                <button onClick={() => setSelectedYear(y => y - 1)} className="w-8 h-8 flex items-center justify-center rounded-full hover:bg-blue-600 transition-colors" title="이전 연도"><i className="fa-solid fa-chevron-left"></i></button>
                                <span className="font-bold text-lg w-40 text-center tracking-wide">{selectedYear}년 <span className="text-xs font-normal text-blue-200">({selectedYear}.3~{selectedYear+1}.2)</span></span>
                                <button onClick={() => setSelectedYear(y => y + 1)} className="w-8 h-8 flex items-center justify-center rounded-full hover:bg-blue-600 transition-colors" title="다음 연도"><i className="fa-solid fa-chevron-right"></i></button>
                            </div>
                        </div>
                        <div className="space-x-2">
                            <button onClick={() => setActiveTab('overview')} className={`px-4 py-2 rounded transition-colors ${activeTab === 'overview' ? 'bg-white text-blue-800 font-bold' : 'hover:bg-blue-700'}`}>개요</button>
                            <button onClick={() => setActiveTab('history')} className={`px-4 py-2 rounded transition-colors ${activeTab === 'history' ? 'bg-white text-blue-800 font-bold' : 'hover:bg-blue-700'}`}>내역 (장부)</button>
                            <button onClick={() => setActiveTab('chart')} className={`px-4 py-2 rounded transition-colors ${activeTab === 'chart' ? 'bg-white text-blue-800 font-bold' : 'hover:bg-blue-700'}`}>차트/일정</button>
                        </div>
                    </header>
                    <main className="flex-1 p-6 print-full-width relative">
                        {loading ? (
                            <div className="flex justify-center items-center h-64"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-800"></div></div>
                        ) : (
                            <>
                                {activeTab === 'overview' && <OverviewTab budgets={budgets} onTransaction={handleTransaction} onBatchTransaction={handleBatchTransaction} onPrint={() => window.print()} showAlert={showAlert} showConfirm={showConfirm} />}
                                {activeTab === 'history' && <HistoryTab transactions={transactions} budgets={budgets} onPrint={() => window.print()} onDelete={handleDeleteTransaction} onDownload={downloadAttachment} onView={viewAttachment} />}
                                {activeTab === 'chart' && <ChartTab transactions={transactions} year={selectedYear} />}
                            </>
                        )}
                    </main>
                </div>
            );
        };

        // ==========================================
        // Tab 1: Overview
        // ==========================================
        const OverviewTab = ({ budgets, onTransaction, onBatchTransaction, onPrint, showAlert, showConfirm }) => {
            const [mode, setMode] = React.useState('view');
            const [draftBudgets, setDraftBudgets] = React.useState([]);
            
            const [txModalType, setTxModalType] = React.useState(null); 
            const [editNodeModal, setEditNodeModal] = React.useState(null); 
            const [adjustBudgetModal, setAdjustBudgetModal] = React.useState(null);
            const [commitModalOpen, setCommitModalOpen] = React.useState(false);

            const enterMode = (newMode) => {
                setDraftBudgets(JSON.parse(JSON.stringify(budgets)));
                setMode(newMode);
            };

            const cancelMode = () => {
                showConfirm("현재까지 수정한 작업 내용이 모두 사라집니다. 취소하시겠습니까?", () => setMode('view'));
            };

            const processData = (dataSource) => {
                let processed = JSON.parse(JSON.stringify(dataSource));
                const rollUp = (parentId) => {
                    let children = processed.filter(b => b.parent === parentId);
                    let sum = { amount: 0, req: 0, exp: 0 };
                    children.forEach(c => {
                        if (c.type === 'item') {
                            sum.amount += parseInt(c.amount) || 0;
                            sum.req += parseInt(c.requisitioned) || 0;
                            sum.exp += parseInt(c.expended) || 0;
                        } else {
                            const cSum = rollUp(c.id);
                            c.amount = cSum.amount; c.requisitioned = cSum.req; c.expended = cSum.exp;
                            sum.amount += cSum.amount; sum.req += cSum.req; sum.exp += cSum.exp;
                        }
                    });
                    return sum;
                };

                const topLevel = processed.filter(b => b.parent === null);
                topLevel.forEach(t => {
                    const tSum = rollUp(t.id);
                    t.amount = tSum.amount; t.requisitioned = tSum.req; t.expended = tSum.exp;
                });

                const flatten = (parentId, level = 0) => {
                    let result = [];
                    let children = processed.filter(b => b.parent === parentId);
                    children.forEach(c => {
                        result.push({...c, level});
                        if (c.type !== 'item') result = result.concat(flatten(c.id, level + 1));
                    });
                    return result;
                };

                let displayList = [];
                topLevel.forEach(t => {
                    displayList.push({...t, level: 0});
                    displayList = displayList.concat(flatten(t.id, 1));
                });

                const total = topLevel.reduce((acc, curr) => ({
                    amount: acc.amount + (curr.amount || 0), req: acc.req + (curr.requisitioned || 0), exp: acc.exp + (curr.expended || 0)
                }), {amount:0, req:0, exp:0});

                return { displayList, total };
            };

            const { displayList, total } = processData(mode === 'view' ? budgets : draftBudgets);

            const handleDeleteNode = (id) => {
                const target = draftBudgets.find(b => b.id === id);
                let toDelete = [id];
                let changed = true;
                while(changed) {
                    changed = false;
                    draftBudgets.forEach(b => {
                        if (toDelete.includes(b.parent) && !toDelete.includes(b.id)) { toDelete.push(b.id); changed = true; }
                    });
                }
                const sumAmount = draftBudgets.filter(b => toDelete.includes(b.id) && b.type === 'item').reduce((acc, curr) => acc + (curr.amount || 0), 0);
                
                showConfirm(`[${target.title}] 및 하위 항목을 삭제합니다. 연결된 예산 ${formatKRW(sumAmount)}원이 함께 소멸됩니다.\n\n정말 계속하시겠습니까?`, () => {
                    setDraftBudgets(prev => prev.filter(b => !toDelete.includes(b.id)));
                });
            };

            return (
                <div className="bg-white rounded shadow p-6 print-full-width">
                    <div className="flex justify-between items-center mb-4 no-print">
                        <h2 className="text-xl font-bold text-gray-800 flex items-center">
                            예산 현황 총괄표
                            {mode === 'structure' && <span className="ml-3 px-3 py-1 bg-purple-100 text-purple-700 rounded-full text-sm animate-pulse border border-purple-300"><i className="fa-solid fa-wrench mr-1"></i>목 편성 모드 진행 중</span>}
                            {mode === 'adjustment' && <span className="ml-3 px-3 py-1 bg-yellow-100 text-yellow-700 rounded-full text-sm animate-pulse border border-yellow-300"><i className="fa-solid fa-calculator mr-1"></i>예산 조정 모드 진행 중</span>}
                        </h2>
                        
                        {mode === 'view' ? (
                            <div className="space-x-2">
                                <button onClick={() => setTxModalType('requisition')} className="bg-green-600 text-white px-3 py-1.5 rounded hover:bg-green-700 text-sm"><i className="fa-solid fa-pen mr-1"></i> 지출품의 반영</button>
                                <button onClick={() => setTxModalType('expenditure')} className="bg-blue-600 text-white px-3 py-1.5 rounded hover:bg-blue-700 text-sm"><i className="fa-solid fa-pen mr-1"></i> 원인행위/지출결의 반영</button>
                                <div className="inline-block border-l-2 border-gray-300 h-6 mx-2 align-middle"></div>
                                <button onClick={() => enterMode('structure')} className="bg-purple-600 text-white px-3 py-1.5 rounded hover:bg-purple-700 text-sm"><i className="fa-solid fa-layer-group mr-1"></i> 목 편성 모드</button>
                                <button onClick={() => enterMode('adjustment')} className="bg-yellow-600 text-white px-3 py-1.5 rounded hover:bg-yellow-700 text-sm"><i className="fa-solid fa-scale-unbalanced mr-1"></i> 예산 조정 모드</button>
                                <button onClick={onPrint} className="bg-gray-600 text-white px-3 py-1.5 rounded hover:bg-gray-700 text-sm ml-2"><i className="fa-solid fa-print"></i></button>
                            </div>
                        ) : (
                            <div className="space-x-2">
                                <button onClick={() => setCommitModalOpen(true)} className="bg-red-600 text-white px-5 py-2 rounded shadow hover:bg-red-700 font-bold"><i className="fa-solid fa-check mr-1"></i> 변경사항 일괄 저장</button>
                                <button onClick={cancelMode} className="bg-gray-400 text-white px-4 py-2 rounded hover:bg-gray-500 font-bold">작업 취소</button>
                            </div>
                        )}
                    </div>

                    <div className="overflow-x-auto">
                        <table className="w-full text-sm">
                            <thead className="table-header">
                                <tr>
                                    <th className="w-[30%]">세부사업 / 세부항목 / 원가통계비목</th>
                                    <th className="w-[20%]">산출내역</th>
                                    <th className="w-[12%]">예산액</th>
                                    <th className="w-[12%]">지출품의금액</th>
                                    <th className="w-[12%]">원인행위(지출/지급)액</th>
                                    <th className="w-[10%]">예산잔액</th>
                                    <th className="w-[4%]">집행률</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr className="bg-gray-200 font-bold border-b-2 border-gray-400">
                                    <td className="table-cell-text" colSpan="2">총 합계</td>
                                    <td className="table-cell">{formatKRW(total.amount)}</td>
                                    <td className="table-cell text-green-700">{formatKRW(total.req)}</td>
                                    <td className="table-cell text-blue-700">{formatKRW(total.exp)}</td>
                                    <td className="table-cell text-red-600">{formatKRW(total.amount - total.exp)}</td>
                                    <td className="table-cell">{total.amount ? ((total.exp / total.amount) * 100).toFixed(1) : 0}%</td>
                                </tr>
                                {displayList.map((row) => {
                                    const balance = (row.amount || 0) - (row.expended || 0);
                                    const rate = row.amount ? ((row.expended || 0) / row.amount * 100).toFixed(1) : 0;
                                    
                                    let rowClass = "table-cell-text relative group ";
                                    if (row.type === 'category') rowClass += "row-group text-base";
                                    else if (row.type === 'sub') rowClass += "row-subgroup";
                                    else rowClass += "row-item";

                                    let amtClass = "table-cell font-bold ";
                                    if (mode === 'adjustment') {
                                        const original = budgets.find(b => String(b.id) === String(row.id));
                                        if (original && Number(original.amount || 0) !== Number(row.amount || 0)) amtClass += "text-blue-600 bg-blue-50";
                                    }

                                    return (
                                        <tr key={row.id} className="hover:bg-gray-100 transition-colors border-b">
                                            <td className={rowClass}>
                                                <div className="flex justify-between items-center">
                                                    <span>{row.type === 'item' ? row.subTitle : row.title}</span>
                                                    
                                                    {mode === 'structure' && (
                                                        <div className="hidden group-hover:flex space-x-1 absolute right-2 bg-white px-1 shadow rounded">
                                                            {row.type !== 'item' && (
                                                                <button onClick={() => setEditNodeModal({ action: row.type === 'category' ? 'add_sub' : 'add_item', targetId: row.id })} className="text-green-600 hover:bg-green-100 px-1.5 py-0.5 rounded" title="하위 항목 추가"><i className="fa-solid fa-plus"></i></button>
                                                            )}
                                                            <button onClick={() => setEditNodeModal({ action: 'rename', targetId: row.id })} className="text-blue-600 hover:bg-blue-100 px-1.5 py-0.5 rounded" title="이름 변경"><i className="fa-solid fa-pen"></i></button>
                                                            <button onClick={() => handleDeleteNode(row.id)} className="text-red-600 hover:bg-red-100 px-1.5 py-0.5 rounded" title="목 삭제"><i className="fa-solid fa-trash"></i></button>
                                                        </div>
                                                    )}
                                                </div>
                                            </td>
                                            <td className="table-cell-text text-gray-700">{row.type === 'item' ? row.title : ''}</td>
                                            
                                            <td className={amtClass}>
                                                <div className="flex justify-between items-center">
                                                    <span>{formatKRW(row.amount)}</span>
                                                    {mode === 'adjustment' && row.type === 'item' && (
                                                        <button onClick={() => setAdjustBudgetModal({ id: row.id, current: row.amount })} className="ml-2 text-yellow-600 hover:bg-yellow-100 px-1.5 py-0.5 rounded border border-yellow-400 shadow-sm" title="예산액 조정">
                                                            <i className="fa-solid fa-plus-minus"></i>
                                                        </button>
                                                    )}
                                                </div>
                                            </td>
                                            
                                            <td className="table-cell text-gray-500">{formatKRW(row.requisitioned)}</td>
                                            <td className="table-cell text-gray-500">{formatKRW(row.expended)}</td>
                                            <td className="table-cell font-bold text-red-600">{formatKRW(balance)}</td>
                                            <td className="table-cell text-center text-gray-500">{rate}%</td>
                                        </tr>
                                    );
                                })}
                                
                                {mode === 'structure' && (
                                    <tr>
                                        <td colSpan="7" className="p-2 text-center bg-gray-50">
                                            <button onClick={() => setEditNodeModal({ action: 'add_category' })} className="text-purple-600 font-bold hover:underline px-4 py-2"><i className="fa-solid fa-plus mr-1"></i> 최상위 정책사업 신규 추가</button>
                                        </td>
                                    </tr>
                                )}
                            </tbody>
                        </table>
                    </div>

                    {txModalType && <TransactionModal type={txModalType} budgets={budgets} onClose={() => setTxModalType(null)} onConfirm={async (data, files) => { try { await onTransaction(txModalType, data.date, data.items, data.description, files); setTxModalType(null); showAlert("성공적으로 장부에 반영되었습니다."); } catch(e) { showAlert("오류: "+e.message); } }} showAlert={showAlert} />}
                    {editNodeModal && (
                        <NodeEditModal 
                            config={editNodeModal} budgets={draftBudgets} onClose={() => setEditNodeModal(null)}
                            onSave={(newData) => {
                                if (editNodeModal.action === 'rename') {
                                    setDraftBudgets(prev => prev.map(b => String(b.id) === String(editNodeModal.targetId) ? { ...b, ...newData } : b));
                                } else {
                                    setDraftBudgets(prev => [...prev, { id: 'new_node_' + Date.now(), parent: editNodeModal.action === 'add_category' ? null : editNodeModal.targetId, type: editNodeModal.action === 'add_category' ? 'category' : (editNodeModal.action === 'add_sub' ? 'sub' : 'item'), amount: 0, requisitioned: 0, encumbered: 0, expended: 0, ...newData }]);
                                }
                                setEditNodeModal(null);
                            }}
                        />
                    )}
                    {adjustBudgetModal && (
                        <BudgetAdjustModal 
                            data={adjustBudgetModal} budgets={draftBudgets} onClose={() => setAdjustBudgetModal(null)}
                            onSave={(newAmount) => {
                                setDraftBudgets(prev => prev.map(b => String(b.id) === String(adjustBudgetModal.id) ? { ...b, amount: newAmount } : b));
                                setAdjustBudgetModal(null);
                            }}
                        />
                    )}
                    {commitModalOpen && (
                        <CommitModal 
                            mode={mode} onClose={() => setCommitModalOpen(false)} showAlert={showAlert}
                            onConfirm={async (date, desc, files) => {
                                try {
                                    await onBatchTransaction(mode, date, desc, files, draftBudgets);
                                    setCommitModalOpen(false);
                                    setMode('view');
                                    showAlert("작업이 성공적으로 장부에 반영되었습니다.");
                                } catch(e) {
                                    setCommitModalOpen(false);
                                    showAlert("저장 중 오류가 발생했습니다: " + e.message);
                                }
                            }}
                        />
                    )}
                </div>
            );
        };

        // ==========================================
        // Modal: 일반 거래 (품의/지출) 계층별 선택 적용
        // ==========================================
        const TransactionModal = ({ type, budgets, onClose, onConfirm, showAlert }) => {
            const [date, setDate] = React.useState(new Date().toISOString().split('T')[0]);
            const [description, setDescription] = React.useState('');
            const [items, setItems] = React.useState([{ categoryId: '', subId: '', budgetId: '', amount: '' }]);
            const [filesToUpload, setFilesToUpload] = React.useState([]);
            const [isUploading, setIsUploading] = React.useState(false);

            const title = type === 'requisition' ? '지출품의 수기 반영' : '원인행위 및 지출결의 반영';

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsUploading(true);
                
                const processedItems = items.map(item => ({ budgetId: item.budgetId, amount: isNaN(parseInt(item.amount, 10)) ? 0 : parseInt(item.amount, 10) }));

                let uploadedFileData = [];
                if (filesToUpload.length > 0) {
                    try {
                        for (const file of filesToUpload) {
                            if (file.size > 5 * 1024 * 1024) {
                                showAlert(`파일 크기 초과: ${file.name}\n(5MB 이하의 PDF만 첨부 가능합니다.)`);
                                setIsUploading(false); return;
                            }
                            // Storage 연동 적용: 원본 파일 객체 전달
                            uploadedFileData.push({
                                id: 'file_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                                name: file.name,
                                file: file
                            });
                        }
                    } catch (error) {
                        showAlert("파일 처리 중 오류가 발생했습니다."); setIsUploading(false); return; 
                    }
                }
                
                try {
                    await onConfirm({ date, description, items: processedItems }, uploadedFileData);
                } catch(e) {
                    setIsUploading(false);
                }
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[60] overflow-y-auto">
                    <div className="bg-white rounded-lg p-6 w-[1000px] max-w-[95vw] shadow-2xl my-8">
                        <div className="flex justify-between items-center mb-4 border-b pb-2">
                            <h3 className="text-xl font-bold">{title}</h3>
                            <button onClick={onClose} disabled={isUploading} className="text-gray-500 hover:text-black text-2xl"><i className="fa-solid fa-xmark"></i></button>
                        </div>
                        <div className="mb-4 bg-gray-50 p-4 rounded border border-gray-300">
                            <label className="block text-sm font-bold text-gray-700 mb-2"><i className="fa-solid fa-folder-open text-yellow-600 mr-2"></i>증빙 자료 (PDF 등) 첨부 (최대 5MB)</label>
                            <input type="file" multiple accept=".pdf" onChange={(e) => setFilesToUpload(Array.from(e.target.files))} className="block w-full text-sm" />
                            <p className="text-xs text-gray-500 mt-2">* 5MB 이하의 파일만 첨부할 수 있습니다.</p>
                        </div>
                        <form onSubmit={handleSubmit} onInvalid={(e) => e.target.setCustomValidity('반드시 기입 또는 선택해주세요.')} onChange={(e) => e.target.setCustomValidity('')}>
                            <div className="grid grid-cols-2 gap-4 mb-4">
                                <div><label className="block text-sm font-bold mb-1">처리 일자</label><input type="date" value={date} onChange={e=>setDate(e.target.value)} required className="w-full border rounded p-2" /></div>
                                <div><label className="block text-sm font-bold mb-1">적요 (건명)</label><input type="text" value={description} onChange={e=>setDescription(e.target.value)} required placeholder="예시) 강사 수당 지급" className="w-full border rounded p-2" /></div>
                            </div>
                            <div className="mb-4">
                                <label className="block text-sm font-bold mb-1">금액 반영 내역 (계층별 목 선택)</label>
                                {items.map((item, index) => (
                                    <div key={index} className="flex flex-col space-y-2 mb-3 bg-blue-50 p-4 rounded border border-blue-200 shadow-sm">
                                        <div className="flex space-x-2">
                                            <select value={item.categoryId} onChange={e => {const n=[...items]; n[index].categoryId=e.target.value; n[index].subId=''; n[index].budgetId=''; setItems(n)}} className="w-1/3 border rounded p-1.5 text-sm font-bold text-gray-700" required>
                                                <option value="">1. 정책사업 선택...</option>
                                                {budgets.filter(b => b.type === 'category').map(b => <option key={b.id} value={b.id}>{b.title}</option>)}
                                            </select>
                                            <select value={item.subId} onChange={e => {const n=[...items]; n[index].subId=e.target.value; n[index].budgetId=''; setItems(n)}} className="w-1/3 border rounded p-1.5 text-sm font-bold text-gray-700" required disabled={!item.categoryId}>
                                                <option value="">2. 단위사업 선택...</option>
                                                {budgets.filter(b => b.type === 'sub' && String(b.parent) === String(item.categoryId)).map(b => <option key={b.id} value={b.id}>{b.title}</option>)}
                                            </select>
                                            <select value={item.budgetId} onChange={e => {const n=[...items]; n[index].budgetId=e.target.value; setItems(n)}} className="w-1/3 border-2 border-blue-400 rounded p-1.5 text-sm font-bold text-blue-800" required disabled={!item.subId}>
                                                <option value="">3. 원가통계비목 및 산출내역...</option>
                                                {budgets.filter(b => b.type === 'item' && String(b.parent) === String(item.subId)).map(b => <option key={b.id} value={b.id}>[{b.subTitle}] {b.title}</option>)}
                                            </select>
                                        </div>
                                        <div className="flex justify-end items-center space-x-2 mt-2 border-t border-blue-100 pt-2">
                                            <label className="text-sm font-bold text-gray-700">금액 :</label>
                                            <input type="number" value={item.amount} onChange={e => {const n=[...items]; n[index].amount=e.target.value; setItems(n)}} placeholder="지출/품의액 입력" className="w-48 border border-gray-400 rounded p-2 text-right font-bold text-lg text-blue-900" required />
                                            <span className="font-bold text-sm mr-4">원</span>
                                            {items.length > 1 && <button type="button" onClick={() => setItems(items.filter((_, i) => i !== index))} className="text-red-500 hover:bg-red-100 px-3 py-1.5 rounded"><i className="fa-solid fa-trash mr-1"></i>삭제</button>}
                                        </div>
                                    </div>
                                ))}
                                <button type="button" onClick={() => setItems([...items, {categoryId: '', subId: '', budgetId: '', amount: ''}])} className="text-sm text-blue-600 hover:underline font-bold">+ 예산 사용 내역 행 추가</button>
                            </div>
                            <div className="flex justify-end space-x-2 pt-4 border-t">
                                <button type="button" onClick={onClose} disabled={isUploading} className="px-4 py-2 bg-gray-200 font-bold rounded">취소</button>
                                <button type="submit" disabled={isUploading} className="px-6 py-2 bg-blue-600 text-white rounded font-bold">{isUploading ? '저장 중...' : '장부 반영'}</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        // ==========================================
        // Modal: 목 편성 편집 (Rename/Add)
        // ==========================================
        const NodeEditModal = ({ config, budgets, onClose, onSave }) => {
            const target = config.action === 'rename' ? budgets.find(b => String(b.id) === String(config.targetId)) : null;
            const parent = config.action === 'add_sub' || config.action === 'add_item' ? budgets.find(b => String(b.id) === String(config.targetId)) : null;
            
            const [title, setTitle] = React.useState(target ? target.title : '');
            const [subTitle, setSubTitle] = React.useState(target ? (target.subTitle || '') : '');

            const isItem = config.action === 'add_item' || (target && target.type === 'item');

            const handleSubmit = (e) => {
                e.preventDefault();
                onSave({ title, subTitle: isItem ? subTitle : "" });
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-[60]">
                    <div className="bg-white rounded shadow-xl p-6 w-[500px]">
                        <h3 className="text-lg font-bold mb-4 border-b pb-2">
                            {config.action === 'rename' ? '목 이름 변경' : (config.action === 'add_category' ? '정책사업 신설' : `[${parent.title}] 하위 항목 신설`)}
                        </h3>
                        <form onSubmit={handleSubmit} onInvalid={(e) => e.target.setCustomValidity('이름을 입력해주세요.')} onChange={(e) => e.target.setCustomValidity('')}>
                            {isItem && (
                                <div className="mb-3">
                                    <label className="block text-sm font-bold mb-1">원가통계비목</label>
                                    <input type="text" value={subTitle} onChange={e=>setSubTitle(e.target.value)} required className="w-full border p-2 rounded" placeholder="예: 일반수용비" />
                                </div>
                            )}
                            <div className="mb-4">
                                <label className="block text-sm font-bold mb-1">{isItem ? '산출내역 (최종 지출처)' : '사업명'}</label>
                                <input type="text" value={title} onChange={e=>setTitle(e.target.value)} required className="w-full border p-2 rounded" placeholder="이름을 입력하세요" />
                            </div>
                            <div className="flex justify-end space-x-2">
                                <button type="button" onClick={onClose} className="px-4 py-2 bg-gray-200 font-bold rounded">취소</button>
                                <button type="submit" className="px-4 py-2 bg-purple-600 text-white rounded font-bold">확인</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        // ==========================================
        // Modal: 예산 조정
        // ==========================================
        const BudgetAdjustModal = ({ data, budgets, onClose, onSave }) => {
            const item = budgets.find(b => String(b.id) === String(data.id));
            const currentAmt = Number(item.amount) || 0;
            const [diff, setDiff] = React.useState('');
            const [newAmt, setNewAmt] = React.useState(currentAmt === 0 ? '' : currentAmt);

            const handleDiffChange = (e) => {
                const val = e.target.value; setDiff(val);
                if (val === '' || val === '-') setNewAmt('');
                else setNewAmt(currentAmt + parseInt(val, 10));
            };

            const handleNewChange = (e) => {
                const val = e.target.value; setNewAmt(val);
                if (val === '') setDiff('');
                else setDiff(parseInt(val, 10) - currentAmt);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                onSave(Number(newAmt) || 0);
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-[60]">
                    <div className="bg-white rounded shadow-xl p-6 w-[500px]">
                        <h3 className="text-lg font-bold mb-2 border-b pb-2">개별 예산액 조정</h3>
                        <p className="text-sm text-gray-600 mb-4">[{item.subTitle}] {item.title}</p>
                        <form onSubmit={handleSubmit} onInvalid={(e) => e.target.setCustomValidity('최종 금액을 확인해주세요.')} onChange={(e) => e.target.setCustomValidity('')}>
                            <div className="grid grid-cols-2 gap-4 mb-4">
                                <div><label className="block text-sm text-gray-500 mb-1">기존 예산액</label><input type="text" value={formatKRW(currentAmt)} disabled className="w-full border p-2 rounded bg-gray-100 text-right" /></div>
                                <div><label className="block text-sm font-bold text-yellow-600 mb-1">증감액 (+/-)</label><input type="number" value={diff} onChange={handleDiffChange} className="w-full border-2 border-yellow-400 p-2 rounded text-right font-bold" placeholder="예: 500000 또는 -500000" /></div>
                            </div>
                            <div className="mb-4">
                                <label className="block text-sm font-bold text-blue-600 mb-1">변경 후 최종 예산액</label>
                                <input type="number" value={newAmt} onChange={handleNewChange} required className="w-full border-2 border-blue-400 p-2 rounded text-right font-bold text-lg" placeholder="최종 금액" />
                            </div>
                            <div className="flex justify-end space-x-2">
                                <button type="button" onClick={onClose} className="px-4 py-2 bg-gray-200 font-bold rounded">취소</button>
                                <button type="submit" className="px-4 py-2 bg-yellow-600 text-white rounded font-bold">확인</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        // ==========================================
        // Modal: 일괄 반영 (Commit)
        // ==========================================
        const CommitModal = ({ mode, onClose, onConfirm, showAlert }) => {
            const [date, setDate] = React.useState(new Date().toISOString().split('T')[0]);
            const [description, setDescription] = React.useState(mode === 'structure' ? '성립전예산 구조(목) 편성' : '예산액 수동 조정');
            const [filesToUpload, setFilesToUpload] = React.useState([]);
            const [isUploading, setIsUploading] = React.useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsUploading(true);

                let uploadedFileData = [];
                if (filesToUpload.length > 0) {
                    try {
                        for (const file of filesToUpload) {
                            if (file.size > 5 * 1024 * 1024) {
                                showAlert(`파일 크기 초과: ${file.name}\n(5MB 이하의 PDF만 첨부 가능합니다.)`);
                                setIsUploading(false); return;
                            }
                            uploadedFileData.push({
                                id: 'file_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                                name: file.name,
                                file: file
                            });
                        }
                    } catch (error) {
                        showAlert("파일 처리 중 오류가 발생했습니다."); setIsUploading(false); return; 
                    }
                }
                
                try {
                    await onConfirm(date, description, uploadedFileData);
                } catch(e) {
                    setIsUploading(false);
                }
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-[60]">
                    <div className="bg-white rounded-lg p-6 w-[600px] shadow-2xl">
                        <h3 className="text-xl font-bold mb-4 border-b pb-2 text-red-600"><i className="fa-solid fa-check-double mr-2"></i>작업 내용 일괄 반영</h3>
                        <p className="text-sm text-gray-600 mb-4">현재까지 조정한 내역을 장부에 확정 저장합니다. 내역에 표시될 사유와 근거 서류를 등록하세요.</p>
                        <form onSubmit={handleSubmit} onInvalid={(e) => e.target.setCustomValidity('반드시 기입해주세요.')} onChange={(e) => e.target.setCustomValidity('')}>
                            <div className="mb-4 bg-gray-50 p-3 rounded border">
                                <label className="block text-sm font-bold mb-2">증빙 자료 (PDF 등) 첨부 (최대 5MB)</label>
                                <input type="file" multiple accept=".pdf" onChange={(e) => setFilesToUpload(Array.from(e.target.files))} className="block w-full text-sm" />
                            </div>
                            <div className="mb-3">
                                <label className="block text-sm font-bold mb-1">반영 일자</label>
                                <input type="date" value={date} onChange={e=>setDate(e.target.value)} required className="w-full border rounded p-2" />
                            </div>
                            <div className="mb-6">
                                <label className="block text-sm font-bold mb-1">적요 (변경 사유)</label>
                                <input type="text" value={description} onChange={e=>setDescription(e.target.value)} required className="w-full border rounded p-2" />
                            </div>
                            <div className="flex justify-end space-x-2">
                                <button type="button" onClick={onClose} disabled={isUploading} className="px-4 py-2 bg-gray-200 font-bold rounded">돌아가기</button>
                                <button type="submit" disabled={isUploading} className="px-6 py-2 bg-red-600 text-white rounded font-bold">{isUploading ? '저장 중...' : '확인 및 최종 반영'}</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        // ==========================================
        // Tab 2: History & Detail Modal
        // ==========================================
        const HistoryTab = ({ transactions, budgets, onPrint, onDelete, onDownload, onView }) => {
            const [searchTerm, setSearchTerm] = React.useState('');
            const [filterType, setFilterType] = React.useState('all');
            const [sortOrder, setSortOrder] = React.useState('desc');
            const [selectedTx, setSelectedTx] = React.useState(null);

            const getFullBudgetHierarchy = (budgetId) => {
                const item = budgets.find(b => String(b.id) === String(budgetId));
                if (!item) return { fullPath: '삭제되었거나 알 수 없는 목', shortPath: '삭제됨', cat: '', sub: '', subTitle: '', title: '' };
                const sub = budgets.find(b => String(b.id) === String(item.parent));
                const category = sub ? budgets.find(b => String(b.id) === String(sub.parent)) : null;
                const catStr = category ? category.title : ''; const subStr = sub ? sub.title : '';
                return { fullPath: `${catStr} > ${subStr} > ${item.subTitle} > ${item.title}`, shortPath: `[${item.subTitle}] ${item.title}`, cat: catStr, sub: subStr, subTitle: item.subTitle, title: item.title };
            };

            const getTypeLabel = (type) => {
                switch(type) {
                    case 'requisition': return <span className="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold border border-green-300">품의</span>;
                    case 'expenditure': return <span className="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs font-bold border border-blue-300">지출/원인행위</span>;
                    case 'structure': return <span className="bg-purple-100 text-purple-700 px-2 py-1 rounded text-xs font-bold border border-purple-300">목 편성</span>;
                    case 'adjustment': return <span className="bg-yellow-100 text-yellow-700 px-2 py-1 rounded text-xs font-bold border border-yellow-300">예산 조정</span>;
                    default: return type;
                }
            };

            const sortedTransactions = [...transactions].sort((a, b) => {
                const dateA = new Date(a.date).getTime(); const dateB = new Date(b.date).getTime();
                return sortOrder === 'desc' ? dateB - dateA : dateA - dateB;
            });

            let displayRows = [];
            sortedTransactions.forEach(t => {
                if (t.type === 'structure') {
                    displayRows.push({ ...t, itemId: `${t.id}_structure`, budgetId: null, amount: 0, isFirstInGroup: true, rowSpan: 1 });
                } else if (t.items && t.items.length > 0) {
                    t.items.forEach((item, idx) => {
                        displayRows.push({ ...t, itemId: `${t.id}_${idx}`, budgetId: item.budgetId, amount: item.amount, isFirstInGroup: idx === 0, rowSpan: t.items.length });
                    });
                }
            });

            const filteredRows = displayRows.filter(row => {
                const matchType = filterType === 'all' || row.type === filterType || (filterType === 'adjustment' && row.type === 'structure');
                const matchSearch = row.description.includes(searchTerm) || (row.budgetId ? getFullBudgetHierarchy(row.budgetId).shortPath.includes(searchTerm) : false) || row.date.includes(searchTerm);
                return matchType && matchSearch;
            });

            return (
                <div className="bg-white rounded shadow p-6 print-full-width">
                    <div className="flex justify-between items-center mb-6 no-print">
                        <h2 className="text-xl font-bold text-gray-800">예산 변동 내역 장부</h2>
                        <div className="flex space-x-2">
                            <button onClick={() => setSortOrder(sortOrder === 'desc' ? 'asc' : 'desc')} className="border border-gray-300 rounded px-3 py-2 text-sm hover:bg-gray-100 font-bold"><i className={`fa-solid fa-arrow-down-${sortOrder === 'desc' ? 'wide-short' : 'short-wide'} mr-1`}></i>일자 {sortOrder === 'desc' ? '내림차순' : '올림차순'}</button>
                            <select value={filterType} onChange={e => setFilterType(e.target.value)} className="border rounded p-2 text-sm"><option value="all">전체 내역</option><option value="requisition">품의 내역</option><option value="expenditure">지출 내역</option><option value="adjustment">예산/목 조정</option></select>
                            <input type="text" placeholder="검색어 입력..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="border rounded p-2 w-64 text-sm" />
                            <button onClick={onPrint} className="bg-gray-600 text-white px-3 py-2 rounded hover:bg-gray-700"><i className="fa-solid fa-print"></i></button>
                        </div>
                    </div>

                    <div className="overflow-x-auto">
                        <table className="w-full text-sm">
                            <thead className="table-header">
                                <tr>
                                    <th className="w-[12%]">일자</th>
                                    <th className="w-[10%]">구분</th>
                                    <th className="w-[25%]">적요 (상세보기 클릭)</th>
                                    <th className="w-[25%]">예산 목 (세부)</th>
                                    <th className="w-[15%]">금액 (증감)</th>
                                    <th className="w-[13%]">증빙/관리</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filteredRows.length === 0 ? <tr><td colSpan="6" className="text-center p-8 text-gray-500">기록된 내역이 없습니다.</td></tr> : 
                                    filteredRows.map((row) => {
                                        const isStruct = row.type === 'structure';
                                        const isAdj = row.type === 'adjustment';
                                        const hierarchy = isStruct ? null : getFullBudgetHierarchy(row.budgetId);
                                        return (
