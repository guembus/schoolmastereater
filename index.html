<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장성글로컬교육센터 예산 관리</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-storage-compat.js"></script>

    <style>
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background-color: #f3f4f6; }
        .table-header th { background-color: #4b5563; color: white; padding: 0.75rem; border: 1px solid #6b7280; text-align: center; font-weight: 500;}
        .table-cell { padding: 0.5rem; border: 1px solid #d1d5db; text-align: right; }
        .table-cell-text { padding: 0.5rem; border: 1px solid #d1d5db; text-align: left; }
        .row-group { background-color: #f9fafb; font-weight: bold; }
        .row-subgroup { background-color: #ffffff; font-weight: 600; padding-left: 1.5rem !important; }
        .row-item { background-color: #ffffff; padding-left: 2.5rem !important; color: #374151; }
        
        /* Print Styles */
        @media print {
            body { background-color: white; }
            .no-print { display: none !important; }
            .print-full-width { width: 100% !important; max-width: none !important; margin: 0 !important; padding: 0 !important; box-shadow: none !important; }
            table { font-size: 10px; width: 100%; border-collapse: collapse; }
            th, td { border: 1px solid black !important; }
            .table-header th { background-color: #e5e7eb !important; color: black !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // Firebase Configuration Area
        // ==========================================
        const USER_FIREBASE_CONFIG = {
            apiKey: "AIzaSyCVG6f1IazVcq7hPc_RYlZAxX8z8ZqN0_k",
            authDomain: "jgec-budgets.firebaseapp.com",
            projectId: "jgec-budgets",
            storageBucket: "jgec-budgets.firebasestorage.app",
            messagingSenderId: "624606043611",
            appId: "1:624606043611:web:414f3e46ed761caf719bfe"
        };

        let firebaseApp, auth, db, storage;
        let isUsingCustomConfig = false;
        try {
            const hasUserConfig = USER_FIREBASE_CONFIG && USER_FIREBASE_CONFIG.apiKey && USER_FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY";
            const configToUse = hasUserConfig ? USER_FIREBASE_CONFIG : (typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {});
            
            if (Object.keys(configToUse).length > 0) {
                firebaseApp = firebase.initializeApp(configToUse);
                auth = firebase.auth();
                db = firebase.firestore();
                storage = firebase.storage();
                isUsingCustomConfig = hasUserConfig;
            }
        } catch (error) {
            console.error("Firebase initialization error:", error);
        }

        const getAppId = () => typeof __app_id !== 'undefined' ? __app_id : 'jangseong-glocal-budget';

        // ==========================================
        // Initial Data
        // ==========================================
        const INITIAL_BUDGET_DATA = [
            { id: '1', parent: null, title: '외국어 교과활동', type: 'category', amount: 180979000 },
            { id: '2', parent: '1', title: '[초] 영어교과운영', type: 'sub', amount: 800000 },
            { id: '3', parent: '2', title: '영어체험교실운영물품 구입', subTitle: '교육운영비', type: 'item', amount: 400000 },
            { id: '4', parent: '2', title: '영어특색교육활동 및 캠프운영물품 구입', subTitle: '교육운영비', type: 'item', amount: 400000 },
            { id: '5', parent: '1', title: '[초] 원어민보조교사운영', type: 'sub', amount: 26900000 },
            { id: '6', parent: '5', title: '원어민주거지원비', subTitle: '일반수용비', type: 'item', amount: 2800000 },
            { id: '7', parent: '5', title: '원어민보조교사순회수당(학)', subTitle: '운영수당', type: 'item', amount: 0 },
            { id: '8', parent: '5', title: '원어민보조교사보험료', subTitle: '기간제교원법정부담금', type: 'item', amount: 1680000 },
            { id: '9', parent: '5', title: '원어민보조교사퇴직적립금(학)', subTitle: '기간제교원인건비', type: 'item', amount: 0 },
            { id: '10', parent: '5', title: '원어민보조교사수당', subTitle: '운영수당', type: 'item', amount: 22420000 },
            { id: '11', parent: '1', title: '[초] 글로컬교육센터운영(군)', type: 'sub', amount: 133474000 },
            { id: '12', parent: '11', title: '원어민보조교사 숙소 임차료', subTitle: '일반수용비', type: 'item', amount: 4000000 },
            { id: '13', parent: '11', title: '원어민보조교사 수당', subTitle: '운영수당', type: 'item', amount: 30000000 },
            { id: '14', parent: '11', title: '글로컬교육센터 법정부담금', subTitle: '기간제교원법정부담금', type: 'item', amount: 12699000 },
            { id: '15', parent: '11', title: '내부강사 수당', subTitle: '운영수당', type: 'item', amount: 60891000 },
            { id: '16', parent: '11', title: '운영보조원 수당', subTitle: '운영수당', type: 'item', amount: 25884000 },
            { id: '17', parent: '1', title: '[초] 글로컬교육센터운영(도)', type: 'sub', amount: 19805000 },
            { id: '18', parent: '17', title: '원어민주거지원비', subTitle: '일반수용비', type: 'item', amount: 2400000 },
            { id: '19', parent: '17', title: '원어민보조교사 수당', subTitle: '운영수당', type: 'item', amount: 15600000 },
            { id: '20', parent: '17', title: '원어민보조교사보험료 등', subTitle: '기간제교원법정부담금', type: 'item', amount: 1805000 },
        ];

        const formatKRW = (num) => {
            if (num === null || num === undefined) return '0';
            return num.toLocaleString('ko-KR');
        };

        const getFiscalYear = (date = new Date()) => {
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            return month < 3 ? year - 1 : year;
        };

        // 무한 회계연도 생성기 (현재 년도 기준 -5년 ~ +10년)
        const generateYears = () => {
            const currentYear = getFiscalYear();
            const years = [];
            for(let i = currentYear - 5; i <= currentYear + 10; i++) {
                years.push(i);
            }
            return years;
        };

        const App = () => {
            const [user, setUser] = React.useState(null);
            const [activeTab, setActiveTab] = React.useState('overview');
            const [selectedYear, setSelectedYear] = React.useState(getFiscalYear());
            const [budgets, setBudgets] = React.useState([]);
            const [transactions, setTransactions] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [dbStatus, setDbStatus] = React.useState('connecting');
            const [dbErrorMessage, setDbErrorMessage] = React.useState('');

            const yearsList = React.useMemo(() => generateYears(), []);

            React.useEffect(() => {
                if (!auth) {
                    setLoading(false);
                    setDbStatus('local');
                    initializeLocalData(selectedYear);
                    return;
                }

                const initAuth = async () => {
                    try {
                        if (!isUsingCustomConfig && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (error) {
                        setDbStatus('error');
                        setDbErrorMessage('인증 오류: 파이어베이스 콘솔 Authentication > Sign-in method에서 "익명(Anonymous)"을 사용 설정해주세요.');
                        setLoading(false);
                        initializeLocalData(selectedYear);
                    }
                };
                initAuth();

                const unsubscribe = auth.onAuthStateChanged((user) => {
                    setUser(user);
                    if (!user) setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            React.useEffect(() => {
                if (!auth || !user) return;

                const appId = getAppId();
                setLoading(true);
                setDbStatus('connected');

                const budgetRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`budgets_${selectedYear}`);
                const unsubBudgets = budgetRef.onSnapshot((snapshot) => {
                    if (snapshot.empty && selectedYear === 2026) {
                        INITIAL_BUDGET_DATA.forEach(item => {
                            budgetRef.doc(item.id).set({...item, requisitioned: 0, encumbered: 0, expended: 0});
                        });
                    } else {
                        const bData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setBudgets(bData.sort((a, b) => parseInt(a.id) - parseInt(b.id)));
                    }
                }, (error) => {
                    setDbStatus('error');
                    setDbErrorMessage('데이터베이스 읽기 권한 오류');
                });

                const transRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`transactions_${selectedYear}`);
                const unsubTrans = transRef.onSnapshot((snapshot) => {
                    const tData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    // 정렬은 클라이언트(메모리)에서 처리 (Rule 2 준수)
                    setTransactions(tData);
                    setLoading(false);
                }, (error) => {
                    setDbStatus('error');
                    setDbErrorMessage('데이터베이스 읽기 권한 오류');
                    setLoading(false);
                });

                return () => {
                    unsubBudgets();
                    unsubTrans();
                };
            }, [user, selectedYear]);

            const initializeLocalData = (year) => {
                const bKey = `local_budgets_${year}`;
                const tKey = `local_trans_${year}`;
                if (!localStorage.getItem(bKey) && year === 2026) {
                    const initData = INITIAL_BUDGET_DATA.map(item => ({...item, requisitioned: 0, encumbered: 0, expended: 0}));
                    localStorage.setItem(bKey, JSON.stringify(initData));
                }
                setBudgets(JSON.parse(localStorage.getItem(bKey)) || []);
                setTransactions(JSON.parse(localStorage.getItem(tKey)) || []);
            };

            const handleTransaction = async (type, date, items, description, extraBudgets = [], attachedFiles = []) => {
                const newTransId = Date.now().toString();
                const transactionRecord = {
                    id: newTransId, date, type, items, description, attachedFiles, timestamp: new Date().toISOString()
                };

                const budgetUpdates = {};
                items.forEach(item => {
                    if (!budgetUpdates[item.budgetId]) {
                        budgetUpdates[item.budgetId] = { req: 0, enc: 0, exp: 0, amtChange: 0 };
                    }
                    if (type === 'requisition') budgetUpdates[item.budgetId].req += item.amount;
                    if (type === 'encumbrance') budgetUpdates[item.budgetId].enc += item.amount;
                    if (type === 'expenditure') budgetUpdates[item.budgetId].exp += item.amount;
                    if (type === 'adjustment') budgetUpdates[item.budgetId].amtChange += item.amount;
                });

                if (auth && user) {
                    const appId = getAppId();
                    const batch = db.batch();
                    
                    const tRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`transactions_${selectedYear}`).doc(newTransId);
                    batch.set(tRef, transactionRecord);

                    if (extraBudgets && extraBudgets.length > 0) {
                        extraBudgets.forEach(eb => {
                            const ebRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`budgets_${selectedYear}`).doc(eb.id);
                            batch.set(ebRef, eb);
                        });
                    }

                    budgets.forEach(b => {
                        if (budgetUpdates[b.id]) {
                            const bRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`budgets_${selectedYear}`).doc(b.id);
                            const updates = budgetUpdates[b.id];
                            batch.update(bRef, {
                                requisitioned: (b.requisitioned || 0) + updates.req,
                                encumbered: (b.encumbered || 0) + updates.enc,
                                expended: (b.expended || 0) + updates.exp,
                                amount: (b.amount || 0) + updates.amtChange
                            });
                        }
                    });
                    
                    items.forEach(item => {
                        if (type === 'adjustment' && item.isNew) {
                             const bRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`budgets_${selectedYear}`).doc(item.budgetId);
                             batch.set(bRef, {
                                 id: item.budgetId, parent: item.parent, title: item.title, subTitle: item.subTitle, type: 'item',
                                 amount: item.amount, requisitioned: 0, encumbered: 0, expended: 0
                             });
                        }
                    });

                    await batch.commit();
                } else {
                    alert("로컬 모드에서는 거래 내역 저장이 제한될 수 있습니다.");
                }
            };

            const handleDeleteTransaction = async (transId) => {
                if (!window.confirm('이 거래 내역을 삭제하고 예산 금액을 되돌리시겠습니까?')) return;

                const transToDelete = transactions.find(t => t.id === transId);
                if (!transToDelete) return;

                const budgetUpdates = {};
                transToDelete.items.forEach(item => {
                    if (!budgetUpdates[item.budgetId]) {
                        budgetUpdates[item.budgetId] = { req: 0, enc: 0, exp: 0, amtChange: 0 };
                    }
                    if (transToDelete.type === 'requisition') budgetUpdates[item.budgetId].req -= item.amount;
                    if (transToDelete.type === 'encumbrance') budgetUpdates[item.budgetId].enc -= item.amount;
                    if (transToDelete.type === 'expenditure') budgetUpdates[item.budgetId].exp -= item.amount;
                    if (transToDelete.type === 'adjustment') budgetUpdates[item.budgetId].amtChange -= item.amount;
                });

                if (auth && user) {
                    const appId = getAppId();
                    const batch = db.batch();
                    
                    const tRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`transactions_${selectedYear}`).doc(transId);
                    batch.delete(tRef);

                    budgets.forEach(b => {
                        if (budgetUpdates[b.id]) {
                            const bRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(`budgets_${selectedYear}`).doc(b.id);
                            const updates = budgetUpdates[b.id];
                            batch.update(bRef, {
                                requisitioned: (b.requisitioned || 0) + updates.req,
                                encumbered: (b.encumbered || 0) + updates.enc,
                                expended: (b.expended || 0) + updates.exp,
                                amount: (b.amount || 0) + updates.amtChange
                            });
                        }
                    });

                    // Storage 파일 삭제 시도 (에러나도 무시하여 트랜잭션 롤백 방지)
                    if (transToDelete.attachedFiles && transToDelete.attachedFiles.length > 0 && storage) {
                        transToDelete.attachedFiles.forEach(file => {
                            if (file.path) {
                                storage.ref().child(file.path).delete().catch(e => console.error("Storage delete error:", e));
                            }
                        });
                    }

                    await batch.commit();
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-blue-800 text-white p-4 shadow-md no-print flex justify-between items-center">
                        <div className="flex items-center space-x-4">
                            <h1 className="text-2xl font-bold"><i className="fa-solid fa-school mr-2"></i>장성글로컬교육센터 예산 관리</h1>
                            <div className="bg-blue-700 rounded px-3 py-1 flex items-center">
                                <span className="text-sm mr-2">회계연도:</span>
                                <select 
                                    className="bg-transparent text-white font-bold outline-none"
                                    value={selectedYear}
                                    onChange={(e) => setSelectedYear(parseInt(e.target.value))}
                                >
                                    {yearsList.map(y => (
                                        <option key={y} value={y} className="text-black">{y}년 ({y}.3 ~ {y+1}.2)</option>
                                    ))}
                                </select>
                            </div>

                            <div className="flex items-center text-xs ml-4 border border-blue-600 rounded px-2 py-1 bg-blue-900 cursor-help group relative">
                                {dbStatus === 'connecting' && <span className="text-yellow-300"><i className="fa-solid fa-spinner fa-spin mr-1"></i>연결 확인 중...</span>}
                                {dbStatus === 'connected' && <span className="text-green-300 font-bold"><i className="fa-solid fa-cloud mr-1"></i>클라우드 정상 작동</span>}
                                {dbStatus === 'local' && <span className="text-gray-300"><i className="fa-solid fa-hard-drive mr-1"></i>로컬 모드 (저장 불가)</span>}
                                {dbStatus === 'error' && <span className="text-red-300 font-bold"><i className="fa-solid fa-triangle-exclamation mr-1"></i>클라우드 접근 차단됨</span>}
                                
                                {dbStatus === 'error' && (
                                    <div className="absolute top-full left-0 mt-2 w-80 p-3 bg-white text-red-700 text-sm rounded shadow-2xl hidden group-hover:block z-50 font-bold border-2 border-red-500 whitespace-normal">
                                        <i className="fa-solid fa-circle-xmark mr-1"></i>{dbErrorMessage}
                                    </div>
                                )}
                            </div>
                        </div>
                        <div className="space-x-2">
                            <button onClick={() => setActiveTab('overview')} className={`px-4 py-2 rounded transition-colors ${activeTab === 'overview' ? 'bg-white text-blue-800 font-bold' : 'hover:bg-blue-700'}`}>개요</button>
                            <button onClick={() => setActiveTab('history')} className={`px-4 py-2 rounded transition-colors ${activeTab === 'history' ? 'bg-white text-blue-800 font-bold' : 'hover:bg-blue-700'}`}>내역 (장부)</button>
                            <button onClick={() => setActiveTab('chart')} className={`px-4 py-2 rounded transition-colors ${activeTab === 'chart' ? 'bg-white text-blue-800 font-bold' : 'hover:bg-blue-700'}`}>차트/일정</button>
                        </div>
                    </header>

                    <main className="flex-1 p-6 print-full-width">
                        {loading ? (
                            <div className="flex justify-center items-center h-64">
                                <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-800"></div>
                            </div>
                        ) : (
                            <>
                                {activeTab === 'overview' && <OverviewTab budgets={budgets} onTransaction={handleTransaction} onPrint={() => window.print()} />}
                                {activeTab === 'history' && <HistoryTab transactions={transactions} budgets={budgets} onPrint={() => window.print()} onDelete={handleDeleteTransaction} />}
                                {activeTab === 'chart' && <ChartTab transactions={transactions} budgets={budgets} year={selectedYear} />}
                            </>
                        )}
                    </main>
                </div>
            );
        };

        // ==========================================
        // Tab 1: Overview
        // ==========================================
        const OverviewTab = ({ budgets, onTransaction, onPrint }) => {
            const [modalConfig, setModalConfig] = React.useState(null);

            const processData = () => {
                let processed = JSON.parse(JSON.stringify(budgets));
                
                const rollUp = (parentId) => {
                    let children = processed.filter(b => b.parent === parentId);
                    let sum = { amount: 0, req: 0, enc: 0, exp: 0 };
                    
                    children.forEach(c => {
                        if (c.type === 'item') {
                            sum.amount += c.amount || 0;
                            sum.req += c.requisitioned || 0;
                            sum.enc += c.encumbered || 0;
                            sum.exp += c.expended || 0;
                        } else {
                            const cSum = rollUp(c.id);
                            c.amount = cSum.amount;
                            c.requisitioned = cSum.req;
                            c.encumbered = cSum.enc;
                            c.expended = cSum.exp;
                            sum.amount += cSum.amount;
                            sum.req += cSum.req;
                            sum.enc += cSum.enc;
                            sum.exp += cSum.exp;
                        }
                    });
                    return sum;
                };

                const topLevel = processed.filter(b => b.parent === null);
                topLevel.forEach(t => {
                    const tSum = rollUp(t.id);
                    t.amount = tSum.amount;
                    t.requisitioned = tSum.req;
                    t.encumbered = tSum.enc;
                    t.expended = tSum.exp;
                });

                const flatten = (parentId, level = 0) => {
                    let result = [];
                    let children = processed.filter(b => b.parent === parentId);
                    children.forEach(c => {
                        result.push({...c, level});
                        if (c.type !== 'item') result = result.concat(flatten(c.id, level + 1));
                    });
                    return result;
                };

                let displayList = [];
                topLevel.forEach(t => {
                    displayList.push({...t, level: 0});
                    displayList = displayList.concat(flatten(t.id, 1));
                });

                const total = topLevel.reduce((acc, curr) => ({
                    amount: acc.amount + (curr.amount || 0), req: acc.req + (curr.requisitioned || 0),
                    enc: acc.enc + (curr.encumbered || 0), exp: acc.exp + (curr.expended || 0)
                }), {amount:0, req:0, enc:0, exp:0});

                return { displayList, total };
            };

            const { displayList, total } = processData();

            return (
                <div className="bg-white rounded shadow p-6 print-full-width">
                    <div className="flex justify-between items-center mb-4 no-print">
                        <h2 className="text-xl font-bold text-gray-800">예산 현황 총괄표</h2>
                        <div className="space-x-2">
                            <button onClick={() => setModalConfig({type: 'requisition', title: '수기 지출품의 등록 및 근거 첨부', date: new Date().toISOString().split('T')[0]})} className="bg-green-600 text-white px-3 py-1.5 rounded hover:bg-green-700 text-sm"><i className="fa-solid fa-pen mr-1"></i> 지출품의 수기반영</button>
                            <button onClick={() => setModalConfig({type: 'expenditure', title: '수기 지출결의 등록 및 근거 첨부', date: new Date().toISOString().split('T')[0]})} className="bg-blue-600 text-white px-3 py-1.5 rounded hover:bg-blue-700 text-sm"><i className="fa-solid fa-pen mr-1"></i> 지출결의 수기반영</button>
                            <button onClick={() => setModalConfig({type: 'adjustment', title: '성립전예산/예산조정 등록', date: new Date().toISOString().split('T')[0]})} className="bg-purple-600 text-white px-3 py-1.5 rounded hover:bg-purple-700 text-sm"><i className="fa-solid fa-pen-to-square mr-1"></i> 성립전/예산조정</button>
                            <button onClick={onPrint} className="bg-gray-600 text-white px-3 py-1.5 rounded hover:bg-gray-700 text-sm"><i className="fa-solid fa-print mr-1"></i> 출력/PDF</button>
                        </div>
                    </div>

                    <div className="overflow-x-auto">
                        <table className="w-full text-sm">
                            <thead className="table-header">
                                <tr>
                                    <th className="w-1/4">세부사업/세부항목/원가통계비목</th>
                                    <th className="w-1/4">산출내역</th>
                                    <th className="w-[10%]">예산액</th>
                                    <th className="w-[10%]">지출품의금액</th>
                                    <th className="w-[10%]">원인행위금액</th>
                                    <th className="w-[10%]">지출(지급)액</th>
                                    <th className="w-[10%]">예산잔액</th>
                                    <th className="w-[5%]">집행률</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr className="bg-gray-200 font-bold">
                                    <td className="table-cell-text" colSpan="2">총 합계</td>
                                    <td className="table-cell">{formatKRW(total.amount)}</td>
                                    <td className="table-cell text-green-700">{formatKRW(total.req)}</td>
                                    <td className="table-cell text-orange-600">{formatKRW(total.enc)}</td>
                                    <td className="table-cell text-blue-700">{formatKRW(total.exp)}</td>
                                    <td className="table-cell text-red-600">{formatKRW(total.amount - total.exp)}</td>
                                    <td className="table-cell">{total.amount ? ((total.exp / total.amount) * 100).toFixed(1) : 0}%</td>
                                </tr>
                                {displayList.map((row) => {
                                    const balance = (row.amount || 0) - (row.expended || 0);
                                    const rate = row.amount ? ((row.expended || 0) / row.amount * 100).toFixed(1) : 0;
                                    let rowClass = "table-cell-text ";
                                    if (row.type === 'category') rowClass += "row-group";
                                    else if (row.type === 'sub') rowClass += "row-subgroup";
                                    else rowClass += "row-item";

                                    return (
                                        <tr key={row.id} className="hover:bg-blue-50 transition-colors">
                                            <td className={rowClass}>{row.type === 'item' ? row.subTitle : row.title}</td>
                                            <td className="table-cell-text text-gray-600">{row.type === 'item' ? row.title : ''}</td>
                                            <td className="table-cell">{formatKRW(row.amount)}</td>
                                            <td className="table-cell">{formatKRW(row.requisitioned)}</td>
                                            <td className="table-cell">{formatKRW(row.encumbered)}</td>
                                            <td className="table-cell">{formatKRW(row.expended)}</td>
                                            <td className="table-cell">{formatKRW(balance)}</td>
                                            <td className="table-cell text-center">{rate}%</td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>

                    {modalConfig && (
                        <ActionModal 
                            config={modalConfig} 
                            budgets={budgets}
                            onClose={() => setModalConfig(null)} 
                            onConfirm={(data, extraBudgets, uploadedFiles) => {
                                onTransaction(modalConfig.type, data.date, data.items, data.description, extraBudgets, uploadedFiles);
                                setModalConfig(null);
                            }} 
                        />
                    )}
                </div>
            );
        };

        // ==========================================
        // Modal for Actions (수동 입력 및 파일 업로드 전용으로 전환)
        // ==========================================
        const ActionModal = ({ config, budgets, onClose, onConfirm }) => {
            const [date, setDate] = React.useState(config.date);
            const [description, setDescription] = React.useState('');
            const [items, setItems] = React.useState([{ 
                budgetId: '', categoryId: '', newCategoryName: '', subId: '', newSubName: '', 
                subTitleAction: 'select', subTitle: '', title: '', amount: 0 
            }]);
            
            // 파일 업로드 관련 상태
            const [filesToUpload, setFilesToUpload] = React.useState([]);
            const [isUploading, setIsUploading] = React.useState(false);

            const handleFileSelect = (e) => {
                if (e.target.files.length > 0) {
                    setFilesToUpload(Array.from(e.target.files));
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsUploading(true);

                let extraBudgetsToCreate = [];
                let newCatIdMap = {};
                let newSubIdMap = {};

                const processedItems = items.map((item, idx) => {
                    if (config.type === 'adjustment' && item.budgetId === 'NEW') {
                        let finalCategoryId = item.categoryId;
                        let finalSubId = item.subId;

                        if (item.categoryId === 'NEW_CATEGORY') {
                            if (!newCatIdMap[item.newCategoryName]) {
                                const newId = 'new_cat_' + Date.now() + '_' + idx;
                                newCatIdMap[item.newCategoryName] = newId;
                                extraBudgetsToCreate.push({ id: newId, parent: null, title: item.newCategoryName, type: 'category', amount: 0, requisitioned: 0, encumbered: 0, expended: 0 });
                            }
                            finalCategoryId = newCatIdMap[item.newCategoryName];
                        }

                        if (item.subId === 'NEW_SUB') {
                            const subKey = finalCategoryId + '_' + item.newSubName;
                            if (!newSubIdMap[subKey]) {
                                const newId = 'new_sub_' + Date.now() + '_' + idx;
                                newSubIdMap[subKey] = newId;
                                extraBudgetsToCreate.push({ id: newId, parent: finalCategoryId, title: item.newSubName, type: 'sub', amount: 0, requisitioned: 0, encumbered: 0, expended: 0 });
                            }
                            finalSubId = newSubIdMap[subKey];
                        }

                        return {
                            ...item, isNew: true, budgetId: 'new_item_' + Date.now() + '_' + idx,
                            parent: finalSubId, subTitle: item.subTitle, title: item.title
                        };
                    }
                    return item;
                });

                // Firebase Storage 업로드 로직 (연도/월별 폴더 분류)
                let uploadedFileData = [];
                if (filesToUpload.length > 0 && auth && auth.currentUser && storage) {
                    const appId = getAppId();
                    const yearStr = date.substring(0, 4);
                    const monthStr = date.substring(5, 7);
                    
                    try {
                        for (const file of filesToUpload) {
                            // Rule 1 준수: artifacts/{appId}/users/{userId}/...
                            const filePath = `artifacts/${appId}/users/${auth.currentUser.uid}/pdfs/${yearStr}/${monthStr}/${Date.now()}_${file.name}`;
                            const storageRef = storage.ref().child(filePath);
                            await storageRef.put(file);
                            const downloadUrl = await storageRef.getDownloadURL();
                            uploadedFileData.push({ name: file.name, url: downloadUrl, path: filePath });
                        }
                    } catch (error) {
                        console.error("File upload failed:", error);
                        alert("파일 업로드에 실패했습니다. 관리자에게 문의하거나 권한을 확인하세요.");
                        setIsUploading(false);
                        return; // 실패 시 진행 중지
                    }
                }

                setIsUploading(false);
                onConfirm({ date, description, items: processedItems }, extraBudgetsToCreate, uploadedFileData);
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 overflow-y-auto">
                    <div className="bg-white rounded-lg p-6 w-[900px] max-w-5xl shadow-2xl my-8">
                        <div className="flex justify-between items-center mb-4 border-b pb-2">
                            <h3 className="text-xl font-bold">{config.title}</h3>
                            <button onClick={onClose} disabled={isUploading} className="text-gray-500 hover:text-black"><i className="fa-solid fa-xmark text-xl"></i></button>
                        </div>

                        {/* 증빙 자료(PDF) 업로드 섹션 */}
                        <div className="mb-4 bg-gray-50 p-4 rounded border border-gray-300">
                            <label className="block text-sm font-bold text-gray-700 mb-2"><i className="fa-solid fa-folder-open text-yellow-600 mr-2"></i>증빙 자료 첨부 (선택사항)</label>
                            <input type="file" accept=".pdf" multiple onChange={handleFileSelect} className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-gray-600 file:text-white hover:file:bg-gray-700" />
                            <p className="text-xs text-gray-500 mt-2">* 첨부된 파일은 클라우드(Storage)에 연도/월별로 안전하게 영구 보관되며, 장부 내역 탭에서 언제든 조회할 수 있습니다.</p>
                        </div>

                        <form onSubmit={handleSubmit}>
                            <div className="grid grid-cols-2 gap-4 mb-4">
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1">처리 일자</label>
                                    <input type="date" value={date} onChange={(e) => setDate(e.target.value)} required className="w-full border rounded p-2 focus:ring focus:ring-blue-200" />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1">적요 (건명)</label>
                                    <input type="text" value={description} onChange={(e) => setDescription(e.target.value)} required placeholder="ex) 원어민 강사 수당 지급" className="w-full border rounded p-2 focus:ring focus:ring-blue-200" />
                                </div>
                            </div>

                            <div className="mb-4">
                                <label className="block text-sm font-bold text-gray-700 mb-1">금액 반영 내역 (수기 작성)</label>
                                {items.map((item, index) => (
                                    <div key={index} className="mb-2 p-3 bg-blue-50 rounded border border-blue-100">
                                        <div className="flex space-x-2 items-center mb-2">
                                            <select 
                                                value={item.budgetId} 
                                                onChange={(e) => {
                                                    const newItems = [...items];
                                                    newItems[index].budgetId = e.target.value;
                                                    setItems(newItems);
                                                }}
                                                className="flex-1 border rounded p-2 text-sm"
                                                required
                                            >
                                                <option value="">예산 내역(목) 직접 선택...</option>
                                                {config.type === 'adjustment' && <option value="NEW" className="font-bold text-purple-600">+ 신규 예산 생성 (성립전)</option>}
                                                {budgets.filter(b => b.type === 'item').map(b => (
                                                    <option key={b.id} value={b.id}>[{b.subTitle}] {b.title}</option>
                                                ))}
                                            </select>

                                            <input 
                                                type="number" 
                                                value={item.amount || ''} 
                                                onChange={(e) => {
                                                    const newItems = [...items];
                                                    newItems[index].amount = parseInt(e.target.value) || 0;
                                                    setItems(newItems);
                                                }}
                                                placeholder="금액 입력"
                                                className="w-40 border rounded p-2 text-right font-bold"
                                                required
                                            />
                                            <span className="text-sm font-bold">원</span>
                                            {items.length > 1 && (
                                                <button type="button" onClick={() => setItems(items.filter((_, i) => i !== index))} className="text-red-500 hover:bg-red-100 p-2 rounded"><i className="fa-solid fa-trash"></i></button>
                                            )}
                                        </div>
                                        
                                        {/* 신규 목 생성 시 4계층 구조 UI */}
                                        {item.budgetId === 'NEW' && config.type === 'adjustment' && (
                                            <div className="flex flex-col space-y-3 mt-2 pt-3 border-t border-purple-200 bg-purple-50 p-3 rounded">
                                                <div className="flex space-x-4">
                                                    <div className="w-1/2">
                                                        <label className="block text-xs font-bold text-gray-500 mb-1">1. 세부사업 (최상위 정책사업)</label>
                                                        <select value={item.categoryId} onChange={e => {const v=e.target.value; const n=[...items]; n[index].categoryId=v; n[index].subId=v==='NEW_CATEGORY'?'NEW_SUB':''; setItems(n);}} className="w-full border rounded p-1.5 text-sm" required>
                                                            <option value="">기존 세부사업 선택...</option>
                                                            {budgets.filter(b => b.type === 'category').map(b => <option key={b.id} value={b.id}>{b.title}</option>)}
                                                            <option value="NEW_CATEGORY" className="font-bold text-purple-600">+ 신규 세부사업 작성</option>
                                                        </select>
                                                        {item.categoryId === 'NEW_CATEGORY' && <input type="text" placeholder="새 세부사업명 입력" value={item.newCategoryName} onChange={e => {const n=[...items]; n[index].newCategoryName=e.target.value; setItems(n)}} className="w-full border-2 border-purple-400 rounded p-1.5 text-sm mt-2" required />}
                                                    </div>
                                                    <div className="w-1/2">
                                                        <label className="block text-xs font-bold text-gray-500 mb-1">2. 세부항목 (단위사업)</label>
                                                        <select value={item.subId} onChange={e => {const n=[...items]; n[index].subId=e.target.value; setItems(n)}} className="w-full border rounded p-1.5 text-sm" required disabled={!item.categoryId}>
                                                            <option value="">세부항목 선택...</option>
                                                            {item.categoryId && item.categoryId !== 'NEW_CATEGORY' && budgets.filter(b => b.type === 'sub' && b.parent === item.categoryId).map(b => <option key={b.id} value={b.id}>{b.title}</option>)}
                                                            <option value="NEW_SUB" className="font-bold text-purple-600">+ 신규 세부항목 작성</option>
                                                        </select>
                                                        {item.subId === 'NEW_SUB' && <input type="text" placeholder="새 세부항목명 입력" value={item.newSubName} onChange={e => {const n=[...items]; n[index].newSubName=e.target.value; setItems(n)}} className="w-full border-2 border-purple-400 rounded p-1.5 text-sm mt-2" required />}
                                                    </div>
                                                </div>
                                                <div className="flex space-x-4 mt-2">
                                                    <div className="w-1/2">
                                                        <label className="block text-xs font-bold text-gray-500 mb-1">3. 원가통계비목</label>
                                                        <div className="flex space-x-2">
                                                            {item.subId && item.subId !== 'NEW_SUB' && (
                                                                <select value={item.subTitleAction} onChange={e => {const n=[...items]; n[index].subTitleAction=e.target.value; n[index].subTitle=''; setItems(n)}} className="w-1/3 border rounded p-1.5 text-sm"><option value="select">기존 비목</option><option value="new">+ 신규</option></select>
                                                            )}
                                                            {item.subTitleAction === 'select' && item.subId && item.subId !== 'NEW_SUB' ? (
                                                                <select value={item.subTitle} onChange={e => {const n=[...items]; n[index].subTitle=e.target.value; setItems(n)}} className="w-2/3 border rounded p-1.5 text-sm" required>
                                                                    <option value="">비목 선택...</option>
                                                                    {Array.from(new Set(budgets.filter(b => b.parent === item.subId && b.type === 'item').map(b => b.subTitle))).map(st => <option key={st} value={st}>{st}</option>)}
                                                                </select>
                                                            ) : (
                                                                <input type="text" placeholder="ex) 일반수용비" value={item.subTitle} onChange={e => {const n=[...items]; n[index].subTitle=e.target.value; setItems(n)}} className="flex-1 border-2 border-purple-400 rounded p-1.5 text-sm" required />
                                                            )}
                                                        </div>
                                                    </div>
                                                    <div className="w-1/2">
                                                        <label className="block text-xs font-bold text-gray-500 mb-1">4. 산출내역 (최종 지출처)</label>
                                                        <input type="text" placeholder="ex) 직업체험 강사수당" value={item.title} onChange={e => {const n=[...items]; n[index].title=e.target.value; setItems(n)}} className="w-full border rounded p-1.5 text-sm" required />
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))}
                                <button type="button" onClick={() => setItems([...items, {budgetId: '', categoryId: '', newCategoryName: '', subId: '', newSubName: '', subTitleAction: 'select', subTitle: '', title: '', amount: 0}])} className="text-sm text-blue-600 hover:underline mt-1">+ 내역 추가</button>
                            </div>

                            <div className="flex justify-end space-x-2 pt-4 border-t">
                                <button type="button" onClick={onClose} disabled={isUploading} className="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300">취소</button>
                                <button type="submit" disabled={isUploading} className="px-6 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 font-bold flex items-center">
                                    {isUploading ? <><i className="fa-solid fa-spinner fa-spin mr-2"></i>클라우드 저장 중...</> : '장부 반영'}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        // ==========================================
        // Tab 2: History & Detail Modal
        // ==========================================
        const HistoryTab = ({ transactions, budgets, onPrint, onDelete }) => {
            const [searchTerm, setSearchTerm] = React.useState('');
            const [filterType, setFilterType] = React.useState('all');
            const [sortOrder, setSortOrder] = React.useState('desc'); // 기본 내림차순(최신순)
            const [selectedTx, setSelectedTx] = React.useState(null); // 모달 표시용 거래내역

            // 위계(세부사업>세부항목>통계비목>산출내역) 풀네임 생성 유틸리티
            const getFullBudgetHierarchy = (budgetId) => {
                const item = budgets.find(b => b.id === budgetId);
                if (!item) return '알 수 없음/삭제됨';
                
                const sub = budgets.find(b => b.id === item.parent);
                const category = sub ? budgets.find(b => b.id === sub.parent) : null;
                
                const catStr = category ? category.title : '';
                const subStr = sub ? sub.title : '';
                
                return {
                    fullPath: `${catStr} > ${subStr} > ${item.subTitle} > ${item.title}`,
                    shortPath: `[${item.subTitle}] ${item.title}`,
                    cat: catStr, sub: subStr, subTitle: item.subTitle, title: item.title
                };
            };

            const getTypeLabel = (type) => {
                switch(type) {
                    case 'requisition': return <span className="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold border border-green-300">품의</span>;
                    case 'encumbrance': return <span className="bg-orange-100 text-orange-700 px-2 py-1 rounded text-xs font-bold border border-orange-300">원인행위</span>;
                    case 'expenditure': return <span className="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs font-bold border border-blue-300">지출</span>;
                    case 'adjustment': return <span className="bg-purple-100 text-purple-700 px-2 py-1 rounded text-xs font-bold border border-purple-300">예산조정</span>;
                    default: return type;
                }
            };

            // 정렬 처리
            const sortedTransactions = [...transactions].sort((a, b) => {
                const dateA = new Date(a.date).getTime();
                const dateB = new Date(b.date).getTime();
                return sortOrder === 'desc' ? dateB - dateA : dateA - dateB;
            });

            // Flatten for display
            let displayRows = [];
            sortedTransactions.forEach(t => {
                t.items.forEach((item, idx) => {
                    displayRows.push({
                        ...t, // 원본 트랜잭션 데이터 (id, date, type, description, attachedFiles 등)
                        itemId: `${t.id}_${idx}`,
                        budgetId: item.budgetId,
                        amount: item.amount,
                        isFirstInGroup: idx === 0,
                        rowSpan: t.items.length
                    });
                });
            });

            const filteredRows = displayRows.filter(row => {
                const matchType = filterType === 'all' || row.type === filterType;
                const matchSearch = row.description.includes(searchTerm) || getFullBudgetHierarchy(row.budgetId).shortPath.includes(searchTerm) || row.date.includes(searchTerm);
                return matchType && matchSearch;
            });

            return (
                <div className="bg-white rounded shadow p-6 print-full-width">
                    <div className="flex justify-between items-center mb-6 no-print">
                        <h2 className="text-xl font-bold text-gray-800">예산 변동 내역 장부</h2>
                        <div className="flex space-x-2">
                            <button 
                                onClick={() => setSortOrder(sortOrder === 'desc' ? 'asc' : 'desc')} 
                                className="border border-gray-300 rounded px-3 py-2 text-sm hover:bg-gray-100 font-bold"
                            >
                                <i className={`fa-solid fa-arrow-down-${sortOrder === 'desc' ? 'wide-short' : 'short-wide'} mr-1`}></i>
                                일자 {sortOrder === 'desc' ? '내림차순' : '올림차순'}
                            </button>
                            <select value={filterType} onChange={e => setFilterType(e.target.value)} className="border rounded p-2 text-sm">
                                <option value="all">전체 내역</option>
                                <option value="requisition">품의 내역</option>
                                <option value="expenditure">지출 내역</option>
                                <option value="adjustment">예산/성립전 조정</option>
                            </select>
                            <input type="text" placeholder="검색어 입력..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="border rounded p-2 w-64 text-sm" />
                            <button onClick={onPrint} className="bg-gray-600 text-white px-3 py-2 rounded hover:bg-gray-700"><i className="fa-solid fa-print"></i></button>
                        </div>
                    </div>

                    <div className="overflow-x-auto">
                        <table className="w-full text-sm">
                            <thead className="table-header">
                                <tr>
                                    <th className="w-[12%]">일자</th>
                                    <th className="w-[8%]">구분</th>
                                    <th className="w-[27%]">적요 (상세보기 클릭)</th>
                                    <th className="w-[25%]">예산 목 (세부)</th>
                                    <th className="w-[15%]">금액</th>
                                    <th className="w-[13%]">증빙/관리</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filteredRows.length === 0 ? (
                                    <tr><td colSpan="6" className="text-center p-8 text-gray-500">기록된 내역이 없습니다.</td></tr>
                                ) : (
                                    filteredRows.map((row) => {
                                        const hierarchy = getFullBudgetHierarchy(row.budgetId);
                                        return (
                                            <tr key={row.itemId} className="hover:bg-blue-50 border-b group">
                                                {row.isFirstInGroup && <td className="p-3 text-center border-r" rowSpan={row.rowSpan}>{row.date}</td>}
                                                {row.isFirstInGroup && <td className="p-3 text-center border-r" rowSpan={row.rowSpan}>{getTypeLabel(row.type)}</td>}
                                                {row.isFirstInGroup && (
                                                    <td className="p-3 border-r cursor-pointer hover:bg-blue-100 transition-colors" rowSpan={row.rowSpan} onClick={() => setSelectedTx(transactions.find(t => t.id === row.id))}>
                                                        <span className="font-bold text-blue-800 underline decoration-blue-300">{row.description}</span>
                                                    </td>
                                                )}
                                                <td className="p-3 border-r text-gray-700">
                                                    <div className="text-xs text-gray-400 mb-1">{hierarchy.cat} &gt; {hierarchy.sub}</div>
                                                    <div className="font-bold">[{hierarchy.subTitle}] {hierarchy.title}</div>
                                                </td>
                                                <td className="p-3 text-right font-mono font-bold border-r">{formatKRW(row.amount)} 원</td>
                                                {row.isFirstInGroup && (
                                                    <td className="p-3 text-center space-y-2" rowSpan={row.rowSpan}>
                                                        {row.attachedFiles && row.attachedFiles.length > 0 && (
                                                            <div className="text-xs text-green-600 font-bold mb-1"><i className="fa-solid fa-paperclip"></i> 첨부 {row.attachedFiles.length}건</div>
                                                        )}
                                                        <button onClick={() => onDelete(row.id)} className="text-red-500 hover:bg-red-50 border border-red-500 rounded px-2 py-1 text-xs transition-colors w-full">
                                                            <i className="fa-solid fa-undo mr-1"></i>되돌리기
                                                        </button>
                                                    </td>
                                                )}
                                            </tr>
                                        )
                                    })
                                )}
                            </tbody>
                        </table>
                    </div>

                    {/* Transaction Detail Modal */}
                    {selectedTx && (
                        <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50">
                            <div className="bg-white rounded-xl p-8 w-[800px] max-w-full shadow-2xl relative">
                                <button onClick={() => setSelectedTx(null)} className="absolute top-4 right-6 text-gray-400 hover:text-black text-2xl"><i className="fa-solid fa-xmark"></i></button>
                                
                                <div className="border-b pb-4 mb-4">
                                    <div className="flex items-center space-x-3 mb-2">
                                        {getTypeLabel(selectedTx.type)}
                                        <span className="text-gray-500 font-bold"><i className="fa-regular fa-calendar mr-1"></i>{selectedTx.date}</span>
                                    </div>
                                    <h3 className="text-2xl font-bold text-gray-900">{selectedTx.description}</h3>
                                </div>

                                <div className="mb-6">
                                    <h4 className="text-sm font-bold text-gray-700 mb-3 bg-gray-100 p-2 rounded">예산 반영 내역 풀이</h4>
                                    <ul className="space-y-3">
                                        {selectedTx.items.map((item, idx) => {
                                            const h = getFullBudgetHierarchy(item.budgetId);
                                            return (
                                                <li key={idx} className="flex justify-between items-center border border-blue-100 bg-blue-50 p-3 rounded">
                                                    <div className="text-sm">
                                                        <div className="text-gray-500 text-xs mb-1">{h.cat} <i className="fa-solid fa-chevron-right text-[10px] mx-1"></i> {h.sub} <i className="fa-solid fa-chevron-right text-[10px] mx-1"></i> <span className="text-purple-600 font-bold">{h.subTitle}</span></div>
                                                        <div className="font-bold text-gray-800 text-base">{h.title}</div>
                                                    </div>
                                                    <div className="font-mono text-lg font-bold text-blue-700">{formatKRW(item.amount)} 원</div>
                                                </li>
                                            )
                                        })}
                                    </ul>
                                </div>

                                <div>
                                    <h4 className="text-sm font-bold text-gray-700 mb-3 bg-gray-100 p-2 rounded">첨부된 증빙 서류</h4>
                                    {(!selectedTx.attachedFiles || selectedTx.attachedFiles.length === 0) ? (
                                        <p className="text-gray-500 text-sm p-3"><i className="fa-solid fa-circle-exclamation mr-1"></i>첨부된 파일이 없습니다.</p>
                                    ) : (
                                        <div className="grid grid-cols-2 gap-3">
                                            {selectedTx.attachedFiles.map((file, idx) => (
                                                <a key={idx} href={file.url} target="_blank" rel="noopener noreferrer" className="flex items-center p-3 border rounded hover:bg-gray-50 hover:border-blue-400 transition-colors group">
                                                    <i className="fa-solid fa-file-pdf text-red-500 text-2xl mr-3"></i>
                                                    <div className="overflow-hidden">
                                                        <p className="text-sm font-bold text-gray-800 truncate group-hover:text-blue-600">{file.name}</p>
                                                        <p className="text-xs text-gray-400 mt-1">클릭하여 열람 및 다운로드</p>
                                                    </div>
                                                </a>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // Tab 3: Chart & Schedule
        // ==========================================
        const ChartTab = ({ transactions, budgets, year }) => {
            const chartRef = React.useRef(null);
            const chartInstance = React.useRef(null);

            React.useEffect(() => {
                if (!chartRef.current) return;

                const months = ['3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월', '1월', '2월'];
                const expData = new Array(12).fill(0);
                const reqData = new Array(12).fill(0);

                transactions.forEach(t => {
                    const d = new Date(t.date);
                    const m = d.getMonth() + 1;
                    let index = m - 3;
                    if (index < 0) index += 12;

                    const totalAmount = t.items.reduce((sum, item) => sum + item.amount, 0);
                    if (t.type === 'expenditure') expData[index] += totalAmount;
                    if (t.type === 'requisition') reqData[index] += totalAmount;
                });

                if (chartInstance.current) chartInstance.current.destroy();

                chartInstance.current = new Chart(chartRef.current, {
                    type: 'bar',
                    data: {
                        labels: months,
                        datasets: [
                            { label: '월별 지출액', data: expData, backgroundColor: 'rgba(59, 130, 246, 0.7)', borderColor: 'rgb(59, 130, 246)', borderWidth: 1 },
                            { label: '월별 품의액', data: reqData, type: 'line', borderColor: 'rgb(16, 185, 129)', backgroundColor: 'transparent', borderDash: [5, 5], tension: 0.1 }
                        ]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' }, title: { display: true, text: `${year}학년도 월별 예산 집행 추이` } }, scales: { y: { beginAtZero: true, ticks: { callback: (value) => (value / 10000).toLocaleString() + '만' } } } }
                });

                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [transactions, year]);

            const seoulTime = new Date().toLocaleString("ko-KR", { timeZone: "Asia/Seoul" });
            const currentMonth = new Date().toLocaleString("ko-KR", { timeZone: "Asia/Seoul", month: "numeric" }).replace('월', '').trim();
            const predictionText = `작년 동월(${currentMonth}월) 데이터 분석 결과, 주로 '원어민보조교사 수당' 지출이 집중되는 시기입니다. 품의 결재 일정을 선제적으로 관리하시기 바랍니다.`;

            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-white rounded shadow p-6 md:col-span-2">
                            <h2 className="text-xl font-bold text-gray-800 mb-4">예산 집행 시각화</h2>
                            <div className="h-80 relative"><canvas ref={chartRef}></canvas></div>
                        </div>
                        <div className="bg-white rounded shadow p-6 flex flex-col">
                            <h2 className="text-xl font-bold text-gray-800 mb-4">일정 및 예측 안내</h2>
                            <div className="bg-blue-50 p-4 rounded mb-4">
                                <p className="text-sm text-gray-500 mb-1">기준 시간 (서울)</p>
                                <p className="font-bold text-lg text-blue-800"><i className="fa-regular fa-clock mr-2"></i>{seoulTime}</p>
                            </div>
                            <div className="bg-yellow-50 border border-yellow-200 p-4 rounded flex-1">
                                <h3 className="font-bold text-yellow-800 mb-2"><i className="fa-solid fa-lightbulb mr-2"></i>이번 달 지출 예측</h3>
                                <p className="text-sm text-gray-700 leading-relaxed">{predictionText}</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
