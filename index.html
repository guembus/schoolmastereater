                                            <tr key={row.itemId} className="hover:bg-blue-50 border-b group">
                                                {row.isFirstInGroup && <td className="p-3 text-center border-r" rowSpan={row.rowSpan}>{row.date}</td>}
                                                {row.isFirstInGroup && <td className="p-3 text-center border-r" rowSpan={row.rowSpan}>{getTypeLabel(row.type)}</td>}
                                                {row.isFirstInGroup && (
                                                    <td className="p-3 border-r cursor-pointer hover:bg-blue-100 transition-colors" rowSpan={row.rowSpan} onClick={() => setSelectedTx(transactions.find(t => t.id === row.id))}>
                                                        <span className="font-bold text-blue-800 underline decoration-blue-300">{row.description}</span>
                                                    </td>
                                                )}
                                                <td className="p-3 border-r text-gray-700">
                                                    {isStruct ? <span className="text-purple-600 font-bold bg-purple-50 px-2 py-1 rounded">예산 구조 일괄 변경</span> : (
                                                        <div className="font-bold">[{hierarchy.subTitle}] {hierarchy.title}</div>
                                                    )}
                                                </td>
                                                <td className="p-3 text-right font-mono font-bold border-r">
                                                    {isStruct ? '-' : (
                                                        <span className={isAdj ? (row.amount > 0 ? "text-blue-600" : (row.amount < 0 ? "text-red-600" : "")) : ""}>
                                                            {isAdj && row.amount > 0 ? '+' : ''}{formatKRW(row.amount)} 원
                                                        </span>
                                                    )}
                                                </td>
                                                {row.isFirstInGroup && (
                                                    <td className="p-3 text-center space-y-2" rowSpan={row.rowSpan}>
                                                        {row.attachedFiles && row.attachedFiles.length > 0 && <div className="text-xs text-green-600 font-bold mb-1"><i className="fa-solid fa-paperclip"></i> 첨부 {row.attachedFiles.length}건</div>}
                                                        <button onClick={() => onDelete(row.id)} className="text-red-500 hover:bg-red-50 border border-red-500 rounded px-2 py-1 text-xs transition-colors w-full font-bold"><i className="fa-solid fa-rotate-left mr-1"></i>반영취소</button>
                                                    </td>
                                                )}
                                            </tr>
                                        )
                                    })
                                }
                            </tbody>
                        </table>
                    </div>

                    {selectedTx && (
                        <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-[60]">
                            <div className="bg-white rounded-xl p-8 w-[800px] max-w-full shadow-2xl relative max-h-[90vh] overflow-y-auto">
                                <button onClick={() => setSelectedTx(null)} className="absolute top-4 right-6 text-gray-400 hover:text-black text-2xl"><i className="fa-solid fa-xmark"></i></button>
                                
                                <div className="border-b pb-4 mb-4">
                                    <div className="flex items-center space-x-3 mb-2">{getTypeLabel(selectedTx.type)}<span className="text-gray-500 font-bold"><i className="fa-regular fa-calendar mr-1"></i>{selectedTx.date}</span></div>
                                    <h3 className="text-2xl font-bold text-gray-900">{selectedTx.description}</h3>
                                </div>

                                <div className="mb-6">
                                    <h4 className="text-sm font-bold text-gray-700 mb-3 bg-gray-100 p-2 rounded">반영 내역 상세</h4>
                                    
                                    {selectedTx.type === 'structure' ? (
                                        <div className="space-y-4">
                                            {selectedTx.structureChanges.added.length > 0 && (
                                                <div className="bg-green-50 border border-green-200 p-3 rounded">
                                                    <h5 className="font-bold text-green-700 mb-2"><i className="fa-solid fa-plus mr-1"></i>신설 항목</h5>
                                                    <ul className="text-sm list-disc pl-5 space-y-1">{selectedTx.structureChanges.added.map(b => <li key={b.id}>[{b.subTitle || '상위사업'}] {b.title}</li>)}</ul>
                                                </div>
                                            )}
                                            {selectedTx.structureChanges.deleted.length > 0 && (
                                                <div className="bg-red-50 border border-red-200 p-3 rounded">
                                                    <h5 className="font-bold text-red-700 mb-2"><i className="fa-solid fa-trash mr-1"></i>삭제된 항목</h5>
                                                    <ul className="text-sm list-disc pl-5 space-y-1">{selectedTx.structureChanges.deleted.map(b => <li key={b.id}>[{b.subTitle || '상위사업'}] {b.title}</li>)}</ul>
                                                </div>
                                            )}
                                            {selectedTx.structureChanges.renamed.length > 0 && (
                                                <div className="bg-blue-50 border border-blue-200 p-3 rounded">
                                                    <h5 className="font-bold text-blue-700 mb-2"><i className="fa-solid fa-pen mr-1"></i>이름 변경</h5>
                                                    <ul className="text-sm list-disc pl-5 space-y-1">{selectedTx.structureChanges.renamed.map(b => <li key={b.id}>[{b.newSubTitle || '상위사업'}] {b.newTitle}</li>)}</ul>
                                                </div>
                                            )}
                                        </div>
                                    ) : (
                                        <ul className="space-y-3">
                                            {selectedTx.items.map((item, idx) => {
                                                const h = getFullBudgetHierarchy(item.budgetId);
                                                return (
                                                    <li key={idx} className="flex justify-between items-center border border-blue-100 bg-blue-50 p-3 rounded">
                                                        <div className="text-sm">
                                                            <div className="text-gray-500 text-xs mb-1">{h.cat} <i className="fa-solid fa-chevron-right text-[10px] mx-1"></i> {h.sub} <i className="fa-solid fa-chevron-right text-[10px] mx-1"></i> <span className="text-purple-600 font-bold">{h.subTitle}</span></div>
                                                            <div className="font-bold text-gray-800 text-base">{h.title}</div>
                                                        </div>
                                                        <div className="text-right">
                                                            {selectedTx.type === 'adjustment' && <div className="text-xs text-gray-500 mb-1">최종 금액: {formatKRW(item.newTotal)}</div>}
                                                            <div className="font-mono text-lg font-bold text-blue-700">{item.amount > 0 && selectedTx.type === 'adjustment' ? '+' : ''}{formatKRW(item.amount)} 원</div>
                                                        </div>
                                                    </li>
                                                )
                                            })}
                                        </ul>
                                    )}
                                </div>

                                <div>
                                    <h4 className="text-sm font-bold text-gray-700 mb-3 bg-gray-100 p-2 rounded">첨부된 증빙 서류</h4>
                                    {(!selectedTx.attachedFiles || selectedTx.attachedFiles.length === 0) ? (
                                        <p className="text-gray-500 text-sm p-3"><i className="fa-solid fa-circle-exclamation mr-1"></i>첨부된 파일이 없습니다.</p>
                                    ) : (
                                        <div className="flex flex-col space-y-2">
                                            {selectedTx.attachedFiles.map((file, idx) => (
                                                <div key={idx} className="flex items-center justify-between p-3 border rounded hover:bg-gray-50 hover:border-blue-400 transition-colors w-full">
                                                    <div className="flex items-center overflow-hidden flex-1">
                                                        <i className="fa-solid fa-file-pdf text-red-500 text-2xl mr-3"></i>
                                                        <div className="overflow-hidden">
                                                            <p className="text-sm font-bold text-gray-800 truncate">{file.name}</p>
                                                        </div>
                                                    </div>
                                                    <div className="flex space-x-2 ml-2">
                                                        <button onClick={() => onView(file.id, file.name)} className="px-3 py-1.5 bg-blue-100 text-blue-700 hover:bg-blue-200 rounded text-xs font-bold" title="새 창에서 열람">열람</button>
                                                        <button onClick={() => onDownload(file.id, file.name)} className="px-3 py-1.5 bg-gray-200 text-gray-700 hover:bg-gray-300 rounded text-xs font-bold" title="다운로드">다운로드</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // Tab 3: Chart & Schedule
        // ==========================================
        const ChartTab = ({ transactions, year }) => {
            const chartRef = React.useRef(null);
            const chartInstance = React.useRef(null);

            React.useEffect(() => {
                if (!chartRef.current) return;

                const months = ['3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월', '1월', '2월'];
                const expData = new Array(12).fill(0);
                const reqData = new Array(12).fill(0);

                transactions.forEach(t => {
                    if (t.type === 'structure') return; 
                    const d = new Date(t.date);
                    const m = d.getMonth() + 1;
                    let index = m - 3;
                    if (index < 0) index += 12;

                    const totalAmount = (t.items || []).reduce((sum, item) => sum + item.amount, 0);
                    if (t.type === 'expenditure') expData[index] += totalAmount;
                    if (t.type === 'requisition') reqData[index] += totalAmount;
                });

                if (chartInstance.current) chartInstance.current.destroy();

                chartInstance.current = new Chart(chartRef.current, {
                    type: 'bar',
                    data: {
                        labels: months,
                        datasets: [
                            { label: '월별 지출/원인행위액', data: expData, backgroundColor: 'rgba(59, 130, 246, 0.7)', borderColor: 'rgb(59, 130, 246)', borderWidth: 1 },
                            { label: '월별 품의액', data: reqData, type: 'line', borderColor: 'rgb(16, 185, 129)', backgroundColor: 'transparent', borderDash: [5, 5], tension: 0.1 }
                        ]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' }, title: { display: true, text: `${year}학년도 월별 예산 집행 추이` } }, scales: { y: { beginAtZero: true, ticks: { callback: (value) => (value / 10000).toLocaleString() + '만' } } } }
                });

                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [transactions, year]);

            const seoulTime = new Date().toLocaleString("ko-KR", { timeZone: "Asia/Seoul" });
            const currentMonth = new Date().toLocaleString("ko-KR", { timeZone: "Asia/Seoul", month: "numeric" }).replace('월', '').trim();
            const predictionText = `작년 동월(${currentMonth}월) 데이터 분석 결과, 주로 '원어민보조교사 수당' 지출이 집중되는 시기입니다. 품의 결재 일정을 선제적으로 관리하시기 바랍니다.`;

            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-white rounded shadow p-6 md:col-span-2">
                            <h2 className="text-xl font-bold text-gray-800 mb-4">예산 집행 시각화</h2>
                            <div className="h-80 relative"><canvas ref={chartRef}></canvas></div>
                        </div>
                        <div className="bg-white rounded shadow p-6 flex flex-col">
                            <h2 className="text-xl font-bold text-gray-800 mb-4">일정 및 예측 안내</h2>
                            <div className="bg-blue-50 p-4 rounded mb-4">
                                <p className="text-sm text-gray-500 mb-1">기준 시간 (서울)</p>
                                <p className="font-bold text-lg text-blue-800"><i className="fa-regular fa-clock mr-2"></i>{seoulTime}</p>
                            </div>
                            <div className="bg-yellow-50 border border-yellow-200 p-4 rounded flex-1">
                                <h3 className="font-bold text-yellow-800 mb-2"><i className="fa-solid fa-lightbulb mr-2"></i>이번 달 지출 예측</h3>
                                <p className="text-sm text-gray-700 leading-relaxed">{predictionText}</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
